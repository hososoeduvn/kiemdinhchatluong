<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#0c5da5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Hệ thống KĐCLGD Tiểu học · Kiểm định chất lượng giáo dục</title>
<meta name="description" content="Hệ thống Kiểm định Chất lượng Giáo dục cho Trường Tiểu học: quy trình 7 bước CV 5932, quản lý minh chứng, kế hoạch TĐG, AI viết báo cáo theo TT 17/2018 + TT 22/2024.">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📚%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --ink:#0f172a; --ink-muted:#475569; --faint:#94a3b8;
    --bg:#f1f5f9; --panel:#ffffff; --line:#e2e8f0; --line-soft:#eef2f6;
    --brand:#0c5da5; --brand-600:#074388; --brand-50:#eff6fc; --brand-100:#d6e5f3;
    --amber:#b45309; --amber-50:#fffbeb;
    --rose:#e11d48; --rose-50:#fff1f2;
    --sky:#0c5da5; --sky-50:#eff6fc;
    /* Dark navy sidebar theme (both side panels) */
    --sb-bg:#0c5da5;
    --sb-bg-2:#0a4d8a;
    --sb-ink:#ffffff;
    --sb-ink-muted:rgba(255,255,255,0.82);
    --sb-faint:rgba(255,255,255,0.55);
    --sb-line:rgba(255,255,255,0.14);
    --sb-line-soft:rgba(255,255,255,0.08);
    --sb-hover:rgba(255,255,255,0.08);
    --sb-active:rgba(255,255,255,0.16);
  }
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter','Be Vietnam Pro',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{overflow:hidden}
  *{box-sizing:border-box}
  .display{font-family:'Fraunces',Georgia,serif;letter-spacing:-0.01em}
  .doc-font{font-family:'Times New Roman','Liberation Serif',Georgia,serif}

  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:9999;flex-direction:column;gap:14px;color:var(--ink-muted);font-size:14px}
  #boot .sp{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .fadein{animation:fi .22s ease-out}
  @keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

  .app{height:100vh;display:grid;grid-template-rows:56px 1fr;overflow:hidden}
  .main{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 56px);overflow:hidden;position:relative}
  @media(max-width:1024px){.main{grid-template-columns:240px 1fr}}
  /* Mobile: sidebar ẩn mặc định, mở drawer bằng hamburger */
  @media(max-width:768px){
    .main{grid-template-columns:1fr}
    .outline{position:fixed;top:56px;left:0;bottom:0;width:280px;z-index:18;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 10px 30px rgba(0,0,0,.2)}
    .outline.open{transform:translateX(0)}
    .mobile-backdrop{position:fixed;top:56px;left:0;right:0;bottom:0;background:rgba(15,23,42,.45);z-index:17;backdrop-filter:blur(2px);animation:fi .2s ease}
  }

  /* TOP BAR — dải xanh liền mạch với sidebar trái */
  .topbar{background:var(--sb-bg);border-bottom:1px solid var(--sb-line);display:flex;align-items:center;gap:14px;padding:0 16px;height:56px;position:relative;z-index:20;color:var(--sb-ink)}
  .topbar .brand-title{color:#fff}
  .topbar .brand-sub{color:rgba(255,255,255,0.7)}
  .topbar .save-status{color:rgba(255,255,255,0.78)}
  .topbar .sch-pill{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.2)}
  .topbar .sch-pill:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.32);color:#fff}
  .topbar .sch-pill span{color:inherit !important}
  .topbar .btn{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:#fff}
  .topbar .btn:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.35);color:#fff}
  .topbar .btn-soft{background:#fff;color:var(--brand-600);border-color:#fff;font-weight:600}
  .topbar .btn-soft:hover{background:#f1f5f9;color:var(--brand-600);border-color:#f1f5f9}
  .topbar .btn-ghost{background:transparent;border-color:transparent;color:rgba(255,255,255,0.85)}
  .topbar .btn-ghost:hover{background:rgba(255,255,255,0.12);border-color:transparent;color:#fff}

  /* Workspace tabs — chuyển vùng làm việc (Tổng quan / Báo cáo / Minh chứng / Kế hoạch) */
  .ws-tab{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;font-size:12.5px;font-weight:500;color:rgba(255,255,255,0.72);background:transparent;border:0;border-radius:7px;cursor:pointer;transition:all .12s;position:relative;white-space:nowrap}
  .ws-tab:hover{background:rgba(255,255,255,0.1);color:#fff}
  .ws-tab.active{background:rgba(255,255,255,0.18);color:#fff;font-weight:600;box-shadow:inset 0 -2px 0 #fff}
  .ws-tab .ws-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:17px;padding:0 5px;background:rgba(255,255,255,0.25);color:#fff;font-size:10.5px;font-weight:600;border-radius:999px;margin-left:2px}
  .ws-tab.active .ws-badge{background:#fff;color:var(--brand-600)}

  .outline{background:var(--sb-bg);border-right:1px solid var(--sb-line);overflow-y:auto;overflow-x:hidden;color:var(--sb-ink)}
  .outline::-webkit-scrollbar,.doc-scroll::-webkit-scrollbar{width:8px}
  .outline::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px}
  .outline::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.35)}
  .doc-scroll::-webkit-scrollbar-thumb{background:#d8e0e8;border-radius:4px}
  .doc-scroll::-webkit-scrollbar-thumb:hover{background:#b8c4d0}
  .doc-scroll{overflow-y:auto;background:var(--bg)}

  .doc-wrap{max-width:860px;margin:0 auto;padding:28px 32px 120px}
  /* CĂN CỨ: Nghị định 30/2020/NĐ-CP + yêu cầu user 2026-04-19:
     Toàn bộ BÁO CÁO dùng Times New Roman 14pt. Tiêu đề lớn in hoa đậm.
     UI shell (sidebar/topbar/modal) giữ Inter cho dễ đọc. */
  .doc-page{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:48px 56px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -12px rgba(15,23,42,.08);font-family:'Times New Roman','Liberation Serif',Georgia,serif}
  .doc-section{scroll-margin-top:80px;margin-top:40px}
  .doc-section:first-child{margin-top:0}
  .doc-h1{font-family:'Times New Roman',serif;font-size:20pt;font-weight:bold;color:var(--ink);letter-spacing:0;margin:0 0 6pt;text-transform:uppercase}
  .doc-h2{font-family:'Times New Roman',serif;font-size:16pt;font-weight:bold;color:var(--ink);margin:16pt 0 8pt;letter-spacing:0;text-transform:uppercase}
  .doc-h3{font-family:'Times New Roman',serif;font-size:14pt;font-weight:bold;color:var(--ink);margin:12pt 0 6pt;text-transform:uppercase;letter-spacing:0}
  .doc-body{font-family:'Times New Roman',serif;font-size:14pt;line-height:1.6;color:#111827;white-space:pre-wrap;word-wrap:break-word}
  .doc-body strong,.doc-body b{color:var(--ink);font-weight:bold}
  .doc-body p{margin:0 0 8pt;text-indent:1.27cm;text-align:justify}
  .doc-body p:first-child{margin-top:0}
  .doc-body table{border-collapse:collapse;width:100%;margin:8pt 0;font-size:13pt}
  .doc-body table td,.doc-body table th{border:1px solid #94a3b8;padding:6px 10px;vertical-align:top}
  .doc-body table th{background:#f1f5f9;font-weight:bold;text-align:center}
  .doc-placeholder{color:var(--faint);font-style:italic;font-family:'Inter',sans-serif;font-size:14px;padding:14px 16px;background:#f8fafc;border:1px dashed var(--line);border-radius:8px;text-align:center}
  /* Hyperlink mã minh chứng [Hx-x.x-yy] trong preview — dẫn tới file Drive */
  .doc-body a.mc-link,.mc-link{color:var(--brand-600);font-weight:500;text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:1px;cursor:pointer;transition:all .12s}
  .doc-body a.mc-link:hover,.mc-link:hover{color:var(--brand);background:var(--brand-50);text-decoration-thickness:2px;border-radius:3px;padding:0 2px;margin:0 -2px}
  /* Mã không có link — underline nét đứt mờ để user biết CHƯA thêm link file Drive */
  .doc-body .mc-code-nolink,.mc-code-nolink{color:var(--ink-muted);text-decoration:underline dotted;text-decoration-color:#cbd5e1;text-underline-offset:3px;cursor:help}
  .doc-body .mc-code-nolink:hover,.mc-code-nolink:hover{color:var(--amber);text-decoration-color:var(--amber)}
  .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-bottom:6px;border-bottom:1px solid var(--line-soft)}
  .section-meta{font-size:12px;color:var(--faint);font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
  .section-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
  .doc-section:hover .section-actions,.doc-section.active .section-actions{opacity:1}
  .doc-section.active{position:relative}
  .doc-section.active::before{content:'';position:absolute;left:-18px;top:0;bottom:0;width:3px;background:var(--brand);border-radius:3px}

  textarea.edit{width:100%;min-height:220px;padding:14px;border:1px solid var(--brand);border-radius:8px;font-family:'Times New Roman',serif;font-size:15px;line-height:1.65;resize:vertical;outline:none;background:#fffef8}
  textarea.edit:focus{box-shadow:0 0 0 3px var(--brand-100)}

  .outline-h{padding:14px 16px 10px;position:sticky;top:0;background:var(--sb-bg);border-bottom:1px solid var(--sb-line);z-index:2}
  .outline-search{width:100%;padding:7px 10px;border:1px solid var(--sb-line);border-radius:6px;font-size:13px;background:rgba(255,255,255,0.08);color:var(--sb-ink);outline:none}
  .outline-search::placeholder{color:var(--sb-faint)}
  .outline-search:focus{border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.15)}
  .ol-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--sb-ink-muted);user-select:none}
  .ol-item:hover{background:var(--sb-hover);color:var(--sb-ink)}
  .ol-item.active{background:var(--sb-active);color:#fff;font-weight:500;box-shadow:inset 2px 0 0 #fff}
  .ol-item .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);flex-shrink:0}
  .ol-item.done .dot{background:#4ade80}
  .ol-item.gen .dot{background:#7dd3fc;animation:blink 1s ease-in-out infinite}
  .ol-item.err .dot{background:#fda4af}
  @keyframes blink{50%{opacity:.3}}
  .ol-section{padding:10px 10px 4px 16px;font-size:11px;color:var(--sb-faint);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-top:8px;border-top:1px solid var(--sb-line-soft)}
  .ol-item.indent{padding-left:26px;font-size:12.5px}
  .ol-item.indent2{padding-left:36px;font-size:12px}
  .ol-group{padding:6px 10px 6px 16px;font-weight:600;font-size:12.5px;color:var(--sb-ink);cursor:pointer;display:flex;align-items:center;gap:6px;margin:2px 8px;border-radius:6px}
  .ol-group:hover{background:var(--sb-hover)}
  .ol-group .chev{transition:transform .15s;color:var(--sb-ink-muted)}
  .ol-group.open .chev{transform:rotate(90deg)}
  .ol-tree{overflow:hidden;max-height:0;transition:max-height .25s ease}
  .ol-tree.open{max-height:2000px}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:7px;font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;transition:all .12s;white-space:nowrap}
  .btn:hover{background:#f8fafc;border-color:#cbd5e1}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn-primary:hover{background:var(--brand-600);border-color:var(--brand-600)}
  .btn-ghost{border-color:transparent;background:transparent}
  .btn-ghost:hover{background:#f1f5f9;border-color:transparent}
  .btn-soft{background:var(--brand-50);color:var(--brand-600);border-color:transparent}
  .btn-soft:hover{background:var(--brand-100)}
  .btn-xs{padding:4px 8px;font-size:12px;gap:4px}
  .btn-icon{width:30px;height:30px;padding:0;justify-content:center}

  /* Guide modal — light theme (bên trong modal trắng) */
  .dp-empty{padding:24px 20px;color:var(--ink-muted);font-size:13px;line-height:1.6}
  .dp-head{padding:0 0 14px;border-bottom:1px solid var(--line-soft);margin-bottom:14px}
  .dp-kicker{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--brand-600);font-weight:600}
  .dp-title{font-family:'Inter',sans-serif;font-size:18px;font-weight:700;margin-top:4px;line-height:1.35;color:var(--ink)}
  .dp-refs{font-size:12px;color:var(--faint);margin-top:6px;font-style:italic}
  .dp-body{padding:0}
  .dp-tabs{display:flex;gap:2px;background:#f1f5f9;border-radius:8px;padding:3px;margin-bottom:12px}
  .dp-tab{flex:1;padding:7px 10px;font-size:12.5px;font-weight:500;border-radius:5px;cursor:pointer;color:var(--ink-muted);text-align:center;transition:all .12s}
  .dp-tab.active{background:var(--panel);color:var(--brand-600);box-shadow:0 1px 2px rgba(15,23,42,.08)}
  .dp-muc-desc{font-size:12px;color:var(--faint);margin-bottom:10px;font-style:italic;padding:0 2px}
  .dp-chibao{margin-bottom:10px;padding:11px 13px;background:#f8fafc;border:1px solid var(--line-soft);border-radius:7px;font-size:13.5px;line-height:1.6;color:var(--ink)}
  .dp-section-label{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 8px}

  .brand-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1470bd,#0c5da5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0;box-shadow:0 2px 6px rgba(12,93,165,0.25)}
  .sch-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;background:#f1f5f9;border-radius:999px;font-size:12.5px;color:var(--ink);cursor:pointer;border:1px solid transparent}
  .sch-pill:hover{background:var(--brand-50);border-color:var(--brand-100);color:var(--brand-600)}
  .save-status{font-size:12px;color:var(--faint);display:flex;align-items:center;gap:6px}

  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:30;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
  .modal{background:var(--panel);border-radius:14px;max-width:640px;width:100%;max-height:86vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}
  .modal-lg{max-width:900px}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .modal-b{padding:22px;overflow-y:auto;flex:1}
  .modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:#f8fafc}

  .field{display:block;margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:5px}
  .field label .req{color:var(--rose);margin-left:2px}
  .field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13.5px;font-family:inherit;background:#fff;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-100)}
  .field .hint{font-size:11.5px;color:var(--faint);margin-top:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

  .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:0.02em}
  .chip-ok{background:var(--brand-50);color:var(--brand-600)}
  .chip-warn{background:var(--amber-50);color:var(--amber)}
  .chip-err{background:var(--rose-50);color:var(--rose)}
  .chip-sky{background:var(--sky-50);color:var(--sky)}
  .progress-bar{height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden}
  .progress-bar>div{height:100%;background:var(--brand);transition:width .3s}
  .outline .progress-bar{background:rgba(255,255,255,0.15)}
  .outline .progress-bar>div{background:#4ade80}
  .divider{height:1px;background:var(--line-soft);margin:12px 0}
  a{color:var(--brand-600);text-decoration:none}
  a:hover{text-decoration:underline}

  .toast{position:fixed;bottom:20px;right:20px;z-index:40;padding:10px 16px;background:var(--ink);color:#fff;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:tf .3s ease}
  @keyframes tf{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ============================================================
     WORKSPACE CONTAINER — dùng chung cho Tổng quan / Minh chứng / Kế hoạch
  ============================================================ */
  .ws-main{overflow-y:auto;background:var(--bg);height:calc(100vh - 56px)}
  .ws-wrap{max-width:1240px;margin:0 auto;padding:24px 28px 80px}
  .ws-title{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.01em;margin:0 0 4px}
  .ws-subtitle{font-size:13px;color:var(--ink-muted);margin:0 0 20px}
  .ws-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
  .ws-card-h{font-size:14px;font-weight:600;color:var(--ink);margin:0 0 14px;display:flex;align-items:center;gap:8px}
  .ws-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.ws-grid{grid-template-columns:1fr}}
  .ws-stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
  .ws-stat-label{font-size:11.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
  .ws-stat-value{font-size:26px;font-weight:700;color:var(--ink);line-height:1.1;font-family:'Inter',sans-serif}
  .ws-stat-sub{font-size:12px;color:var(--ink-muted);margin-top:4px}

  /* Workflow 7 bước — khối màu rõ nét phân biệt trạng thái */
  .wf-step{display:grid;grid-template-columns:auto 1fr auto;gap:14px;padding:14px 16px;border:2px solid transparent;border-radius:12px;align-items:center;transition:all .18s;position:relative;overflow:hidden}
  .wf-step::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--line)}
  /* Pending — xám nhẹ */
  .wf-step.pending{background:#f8fafc;border-color:#e2e8f0}
  .wf-step.pending::before{background:#cbd5e1}
  .wf-step.pending:hover{background:#fff;border-color:var(--brand-100);box-shadow:0 2px 8px rgba(12,93,165,.06)}
  /* Auto-done — xanh lá nhạt + dashed */
  .wf-step.auto-done{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border-color:#86efac;border-style:dashed}
  .wf-step.auto-done::before{background:#22c55e}
  /* Done — xanh lá đậm solid */
  .wf-step.done{background:linear-gradient(135deg,#dcfce7,#f0fdf4);border-color:#22c55e}
  .wf-step.done::before{background:#15803d}
  /* Current — xanh dương đậm với pulse */
  .wf-step.current{background:linear-gradient(135deg,var(--brand-50),#fff);border-color:var(--brand);box-shadow:0 4px 14px rgba(12,93,165,.14)}
  .wf-step.current::before{background:var(--brand)}
  .wf-num{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;background:#fff;color:var(--ink-muted);border:2px solid var(--line);transition:all .2s}
  .wf-step.pending .wf-num{background:#fff;color:#94a3b8;border-color:#cbd5e1}
  .wf-step.auto-done .wf-num{background:#dcfce7;color:#15803d;border-color:#86efac}
  .wf-step.done .wf-num{background:#15803d;color:#fff;border-color:#15803d;box-shadow:0 2px 6px rgba(21,128,61,.3)}
  .wf-step.current .wf-num{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 2px 8px rgba(12,93,165,.3);animation:wfpulse 1.8s ease-in-out infinite}
  @keyframes wfpulse{0%,100%{box-shadow:0 0 0 0 rgba(12,93,165,.45),0 2px 8px rgba(12,93,165,.3)}50%{box-shadow:0 0 0 8px rgba(12,93,165,0),0 2px 8px rgba(12,93,165,.3)}}
  .wf-body{min-width:0}
  .wf-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:3px;display:flex;align-items:center;gap:6px}
  .wf-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:0.02em;text-transform:uppercase}
  .wf-badge.done{background:#15803d;color:#fff}
  .wf-badge.auto{background:#86efac;color:#14532d}
  .wf-badge.current{background:var(--brand);color:#fff}
  .wf-desc{font-size:12.5px;color:var(--ink-muted);line-height:1.55}
  .wf-meta{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;font-size:11.5px;color:var(--faint)}
  .wf-meta span{display:inline-flex;align-items:center;gap:3px}
  .wf-actions{display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0;min-width:130px}
  /* Toggle chi tiết rõ ràng hơn (không còn quá mờ) */
  .wf-detail-btn{background:rgba(12,93,165,0.08);color:var(--brand-600);border:1px solid var(--brand-100);padding:3px 9px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:3px;transition:all .12s}
  .wf-detail-btn:hover{background:rgba(12,93,165,0.15);border-color:var(--brand)}
  .wf-detail-box{display:none;margin-top:8px;padding:10px;background:#fff;border:1px dashed var(--brand-100);border-radius:7px;gap:6px;flex-direction:column}
  .wf-detail-box.open{display:flex}
  .wf-detail-box input,.wf-detail-box textarea{padding:6px 9px;border:1px solid var(--line);border-radius:5px;font-size:12px;font-family:inherit;outline:none}
  .wf-detail-box input:focus,.wf-detail-box textarea:focus{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-100)}
  .wf-detail-label{font-size:10.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:-3px}

  /* Dashed divider có label ở giữa — dùng trong card Mức độ đạt được */
  .sep-dashed{position:relative;height:18px;margin:18px 0 14px;display:flex;align-items:center;justify-content:center}
  .sep-dashed::before{content:'';position:absolute;left:0;right:0;top:50%;border-top:2px dashed var(--brand-100)}
  .sep-dashed span{position:relative;background:var(--panel);padding:0 12px;font-size:10.5px;font-weight:700;color:var(--brand-600);text-transform:uppercase;letter-spacing:0.08em}

  /* Bar ngang cho phân bố tiêu chí theo Mức */
  .dist-row{display:grid;grid-template-columns:90px 1fr 46px;gap:10px;align-items:center;margin-bottom:6px}
  .dist-label{font-size:12px;color:var(--ink)}
  .dist-bar{height:18px;background:#f1f5f9;border-radius:4px;overflow:hidden;position:relative}
  .dist-fill{height:100%;transition:width .4s;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;color:#fff;font-size:11px;font-weight:600}
  .dist-count{text-align:right;font-size:12px;font-weight:600;color:var(--ink-muted)}

  /* ============================================================
     HELP MODAL — Hướng dẫn chi tiết cả hệ thống
  ============================================================ */
  .modal-xxl{max-width:1100px;height:90vh}
  .help-body{display:grid;grid-template-columns:260px 1fr;height:calc(90vh - 70px);overflow:hidden}
  @media(max-width:900px){.help-body{grid-template-columns:200px 1fr}}
  .help-nav{background:#f8fafc;border-right:1px solid var(--line);overflow-y:auto;padding:10px 6px}
  .help-nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;font-size:13px;color:var(--ink-muted);cursor:pointer;border-radius:7px;margin-bottom:2px;transition:all .12s;user-select:none}
  .help-nav-item:hover{background:#e2e8f0;color:var(--ink)}
  .help-nav-item.active{background:var(--brand);color:#fff;font-weight:600;box-shadow:0 2px 6px rgba(12,93,165,.2)}
  .help-nav-item.active .hi-num{background:#fff;color:var(--brand-600)}
  .hi-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:rgba(12,93,165,.12);color:var(--brand-600);font-size:11.5px;font-weight:700;flex-shrink:0}
  .help-nav-section{padding:12px 12px 4px;font-size:10.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:0.08em;margin-top:6px}
  .help-content{padding:28px 36px 60px;overflow-y:auto;font-family:'Inter','Be Vietnam Pro',system-ui,sans-serif}
  @media(max-width:900px){.help-content{padding:20px 22px 60px}}
  .help-content h2{font-size:22px;font-weight:700;color:var(--ink);margin:0 0 6px;font-family:'Fraunces',serif;letter-spacing:-0.01em}
  .help-content .help-sub{font-size:13px;color:var(--ink-muted);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line-soft)}
  .help-content h3{font-size:15.5px;font-weight:700;color:var(--ink);margin:24px 0 8px;display:flex;align-items:center;gap:8px}
  .help-content h4{font-size:13.5px;font-weight:600;color:var(--brand-600);margin:16px 0 6px}
  .help-content p{line-height:1.7;color:var(--ink);font-size:13.5px;margin:0 0 10px}
  .help-content ul,.help-content ol{margin:0 0 12px 22px;line-height:1.7;font-size:13.5px;color:var(--ink);padding:0}
  .help-content ul li,.help-content ol li{margin-bottom:5px}
  .help-content b{color:var(--ink);font-weight:600}
  .help-content code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px;color:var(--brand-600);font-family:ui-monospace,'Consolas',monospace}

  /* Mockup fake-screenshot */
  .help-mockup{border:1.5px solid var(--line);border-radius:10px;padding:16px 18px 14px;margin:14px 0;background:#fff;position:relative;font-size:12.5px;box-shadow:0 4px 14px -6px rgba(15,23,42,.08)}
  .help-mockup-label{position:absolute;top:-10px;left:16px;background:var(--panel);padding:2px 9px;font-size:9.5px;font-weight:700;color:var(--faint);letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--line);border-radius:3px}
  .mock-topbar{background:linear-gradient(90deg,#0c5da5,#074388);color:#fff;padding:9px 14px;border-radius:7px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .mock-tab{padding:4px 10px;border-radius:5px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);font-size:11.5px}
  .mock-tab.active{background:rgba(255,255,255,0.25);color:#fff;font-weight:600;box-shadow:inset 0 -2px 0 #fff}
  .mock-pill{padding:3px 10px;border-radius:999px;background:rgba(255,255,255,0.15);font-size:11px}
  .mock-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--brand);color:#fff;border-radius:5px;font-size:11.5px;font-weight:500}
  .mock-btn.soft{background:var(--brand-50);color:var(--brand-600)}
  .mock-btn.white{background:#fff;color:var(--brand-600);border:1px solid var(--line)}
  .mock-row{display:flex;align-items:center;gap:6px;padding:6px 0;font-size:12px;border-top:1px dashed var(--line-soft)}
  .mock-row:first-child{border-top:0}
  .mock-input{display:inline-block;padding:3px 10px;border:1px solid var(--line);border-radius:4px;font-size:11.5px;background:#fff;color:var(--ink-muted);min-width:120px}
  .mock-sidebar{display:inline-block;padding:4px 10px;background:#0c5da5;color:rgba(255,255,255,0.85);border-radius:4px;font-size:11.5px;margin:2px 0}
  .mock-sidebar.active{background:rgba(255,255,255,0.25);color:#fff;box-shadow:inset 2px 0 0 #fff}

  /* Flow steps */
  .help-flow{display:flex;align-items:center;gap:4px;padding:14px 16px;background:linear-gradient(135deg,var(--brand-50),#f0f9ff);border-radius:10px;margin:14px 0;overflow-x:auto;border:1px solid var(--brand-100)}
  .help-flow-box{flex-shrink:0;background:#fff;border:1px solid var(--brand);border-radius:7px;padding:7px 10px;text-align:center;min-width:90px;font-size:11px;line-height:1.3;box-shadow:0 1px 3px rgba(12,93,165,.1)}
  .help-flow-box b{display:block;color:var(--brand-600);font-size:12px;margin-bottom:2px}
  .help-flow-arrow{color:var(--brand);font-size:16px;font-weight:700}

  /* Callouts */
  .help-note{padding:12px 14px;border-radius:8px;margin:12px 0;font-size:13px;line-height:1.6}
  .help-note.info{background:#f0f9ff;border:1px solid #bae6fd;color:#0c4a6e}
  .help-note.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
  .help-note.success{background:#f0fdf4;border:1px solid #86efac;color:#166534}
  .help-note.danger{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
  .help-note b{font-weight:700}

  /* Q&A */
  .help-qa{border-left:3px solid var(--brand);padding:2px 0 2px 14px;margin:12px 0}
  .help-qa-q{font-weight:600;color:var(--ink);font-size:13.5px;margin-bottom:4px}
  .help-qa-a{font-size:13px;color:var(--ink-muted);line-height:1.6}
  .help-qa-a b{color:var(--ink)}

  /* Kbd */
  kbd{display:inline-block;padding:2px 7px;background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;font-family:ui-monospace,monospace;font-size:11px;color:var(--ink)}

  /* Doc cards — thẻ văn bản pháp lý */
  .help-doc-card{padding:12px 14px;border:1px solid var(--line);border-radius:8px;margin:8px 0;background:#fff}
  .help-doc-title{font-size:13.5px;font-weight:700;color:var(--brand-600);margin-bottom:3px}
  .help-doc-desc{font-size:12.5px;color:var(--ink-muted);line-height:1.55}

  /* ============================================================
     📱 MOBILE RESPONSIVE — tối ưu cho điện thoại & tablet
     Breakpoints:
       ≤1280px: màn hình nhỏ laptop — shrink một chút
       ≤1024px: tablet ngang — ẩn subtitle brand, tabs icon-only
       ≤768px:  tablet dọc / mobile lớn — hamburger, single col, modal full
       ≤480px:  mobile — grid 1 col, tables scroll, stats 2×2
  ============================================================ */

  /* Hamburger & mobile buttons — ẩn trên desktop */
  .hamburger-btn{display:none;width:36px;height:36px;align-items:center;justify-content:center;background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:7px;cursor:pointer;flex-shrink:0}
  .hamburger-btn:hover{background:rgba(255,255,255,0.22)}
  .tb-more{display:none;position:relative}
  .tb-more-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:190px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:4px;box-shadow:0 10px 30px rgba(0,0,0,.15);z-index:25;animation:fi .16s ease}
  .tb-more-menu button{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;background:transparent;border:0;border-radius:6px;color:var(--ink);font-size:13px;font-weight:500;cursor:pointer;text-align:left}
  .tb-more-menu button:hover{background:#f1f5f9}

  /* ≤1280px — compact brand */
  @media(max-width:1280px){
    .brand-sub{display:none}
    .ws-tab span:not(.ws-badge){font-size:12px}
  }

  /* ≤1024px — tabs chỉ icon, sh-pill thu nhỏ */
  @media(max-width:1024px){
    .ws-tab span:not(.ws-badge){display:none}
    .ws-tab{padding:7px 10px}
    .topbar .sch-pill span:last-of-type{display:none}
    .topbar .sch-pill span:first-of-type{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .save-status{display:none}
  }

  /* ≤768px — MOBILE: hamburger + overflow menu */
  @media(max-width:768px){
    .hamburger-btn{display:inline-flex}
    .tb-more{display:inline-block}
    .topbar{padding:0 10px;gap:8px}
    .brand-logo{width:30px;height:30px;font-size:16px}
    .brand-title{font-size:12.5px !important}
    .topbar .sch-pill{display:none}
    .tb-hide-sm{display:none !important}  /* class để ẩn nút trên mobile */
    .doc-wrap{padding:12px 10px 80px}
    .doc-page{padding:20px 18px;border-radius:8px}
    .ws-wrap{padding:16px 12px 60px}
    .ws-title{font-size:18px}
    .ws-card{padding:14px 12px;border-radius:10px}
    .ws-grid{gap:12px}
    /* Dashboard stats 4 → 2 col */
    .ws-wrap > div[style*="grid-template-columns:repeat(4,1fr)"]{grid-template-columns:1fr 1fr !important;gap:8px !important}
    /* Modal full screen */
    .overlay{padding:0}
    .modal,.modal-lg,.modal-xxl{max-width:100%;width:100%;height:100vh;max-height:100vh;border-radius:0}
    .modal-h{padding:14px 16px}
    .modal-b{padding:16px}
    .modal-f{padding:12px 16px}
    /* Form grid → 1 col */
    .grid2,.grid3{grid-template-columns:1fr !important;gap:10px !important}
    /* Help modal */
    .help-body{grid-template-columns:1fr !important;height:calc(100vh - 60px) !important}
    .help-nav{max-height:180px;border-right:0;border-bottom:1px solid var(--line)}
    .help-content{padding:20px 16px 60px}
    .help-content h2{font-size:19px}
    .help-content h3{font-size:14.5px}
    .help-content p,.help-content ul,.help-content ol{font-size:13.5px}
    /* Bar chart full */
    .dist-row{grid-template-columns:72px 1fr 40px;gap:6px}
    .dist-label{font-size:11.5px}
    /* Workflow 7 bước mobile — stack actions xuống dưới */
    .wf-step{grid-template-columns:40px 1fr;padding:12px 12px}
    .wf-actions{grid-column:1 / -1;flex-direction:row;justify-content:flex-end;min-width:0;margin-top:4px}
    /* Plan timeline simplify */
    .plan-tl-row{grid-template-columns:30px 1fr;gap:6px}
    .plan-tl-row > input,.plan-tl-row > select,.plan-tl-row > div:nth-child(n+3){grid-column:2}
    .plan-tl-row:first-of-type{display:none}  /* ẩn header row */
    /* Evidence table scroll */
    .ev-table{font-size:12px;display:block;overflow-x:auto;white-space:nowrap}
    /* School cover preview */
    .doc-body{font-size:13pt;line-height:1.55}
    /* Toast */
    .toast{left:12px;right:12px;bottom:12px}
    /* Touch target — tăng min-height cho mọi nút */
    .btn{min-height:36px}
    .btn-xs{min-height:32px;padding:6px 10px}
    .btn-icon{width:36px;height:36px}
    /* Workspace tabs nhỏ hơn */
    .ws-tab{padding:7px 9px;min-height:34px}
  }

  /* ≤480px — SMALL MOBILE */
  @media(max-width:480px){
    .brand-logo{width:28px;height:28px;font-size:15px}
    .topbar{gap:6px}
    .topbar > div:nth-child(2){display:none}  /* ẩn hoàn toàn brand text trên mobile nhỏ */
    .ws-tab{padding:6px 8px}
    /* Dashboard stats 2 → 1 col */
    .ws-wrap > div[style*="grid-template-columns:repeat(4,1fr)"]{grid-template-columns:1fr !important}
    /* Ma trận 5 TC × 4 Mức — chuyển sang scroll */
    .help-content table,.ws-card table{display:block;overflow-x:auto;white-space:nowrap}
    .doc-page{padding:16px 14px}
    .ws-wrap{padding:12px 8px 60px}
    .ws-card{padding:12px 10px}
    /* Help mockup nhỏ gọn */
    .help-mockup{padding:12px 10px}
    .mock-topbar{flex-wrap:wrap;gap:6px;padding:8px 10px}
    .mock-tab{font-size:10.5px;padding:3px 7px}
    .mock-input{min-width:80px;font-size:10.5px}
    .help-flow{padding:10px 10px;gap:2px}
    .help-flow-box{min-width:74px;padding:6px 7px;font-size:10px}
    .help-flow-box b{font-size:11px}
  }

  /* Print — tắt mobile-only */
  @media print{
    .hamburger-btn,.tb-more,.mobile-backdrop{display:none !important}
  }

  /* Evidence table */
  .ev-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .ev-toolbar input[type="text"],.ev-toolbar select{padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff;outline:none;font-family:inherit}
  .ev-toolbar input:focus,.ev-toolbar select:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-100)}
  .ev-table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;font-size:13px}
  .ev-table th{background:#f8fafc;padding:10px 12px;text-align:left;font-weight:600;font-size:11.5px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--line)}
  .ev-table td{padding:10px 12px;border-top:1px solid var(--line-soft);vertical-align:top}
  .ev-table tr:hover td{background:#f8fafc}
  .ev-code{font-family:ui-monospace,'Consolas',monospace;font-size:11.5px;color:var(--brand-600);font-weight:600;white-space:nowrap}
  .ev-status{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:600;letter-spacing:0.02em}
  .ev-status.pending{background:#fef3c7;color:#b45309}
  .ev-status.collected{background:#dbeafe;color:#1e40af}
  .ev-status.verified{background:#dcfce7;color:#15803d}
  .ev-empty{text-align:center;padding:60px 20px;color:var(--faint)}

  /* Plan form */
  .plan-section{margin-bottom:24px}
  .plan-field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:13.5px;background:#fff;outline:none;resize:vertical;min-height:80px;line-height:1.55}
  .plan-field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-100)}
  .plan-field input[type="text"],.plan-field input[type="date"]{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13.5px;background:#fff;outline:none;font-family:inherit}
  .plan-field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:5px}
  .plan-tl-row{display:grid;grid-template-columns:40px 2.4fr 1fr 1fr 1fr;gap:8px;padding:10px 8px;border-top:1px solid var(--line-soft);align-items:start}
  .plan-tl-row:first-of-type{border-top:0;background:#f8fafc;font-weight:600;font-size:11.5px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.04em;padding:8px}
  .plan-tl-row input,.plan-tl-row select{padding:5px 8px;border:1px solid var(--line);border-radius:5px;font-size:12.5px;background:#fff;outline:none;font-family:inherit}
  .plan-tl-row select:focus,.plan-tl-row input:focus{border-color:var(--brand)}

  @media print{
    body{overflow:auto;background:#fff}
    .app{display:block;height:auto}
    .topbar,.outline,.detail-panel,.section-actions,.doc-placeholder{display:none!important}
    .main{display:block;height:auto}
    .doc-scroll{overflow:visible}
    .doc-wrap{max-width:none;padding:0;margin:0}
    .doc-page{border:0;box-shadow:none;padding:0}
  }
</style>
</head>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

/* ============================================================
   ICONS · lucide-style
============================================================ */
const Ic = (paths, extra = null) => ({ className = 'w-4 h-4', ...props }) => (
  <svg className={className} fill="none" stroke="currentColor" strokeWidth="2"
       strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" {...props}>
    {paths.map((d, i) => <path key={i} d={d}/>)}
    {extra}

const migrateReport = (data) => {
  try {
    if (!data || typeof data !== 'object') return emptyReport();
    const def = emptyReport();
    const schoolInfo = { ...def.schoolInfo, ...(data.schoolInfo || {}) };
    // Đảm bảo council luôn là array
    if (!Array.isArray(schoolInfo.council)) schoolInfo.council = def.schoolInfo.council;
    return {
      ...def,
      ...data,
      schoolInfo,
      sources: { ...def.sources, ...(data.sources || {}) },
      workflow: Array.isArray(data.workflow) && data.workflow.length === 7 ? data.workflow : def.workflow,
      evidence: Array.isArray(data.evidence) ? data.evidence : def.evidence,
      plan: { ...def.plan, ...(data.plan || {}) },
      generated: (data.generated && typeof data.generated === 'object') ? data.generated : {}
    };
  } catch (e) {
    console.warn('Migration lỗi, khởi tạo mới:', e);
    return emptyReport();
  }
};

/* Trích "Đạt Mức X" / "Không đạt" từ nội dung tự đánh giá của tiêu chí.
   Trả về: null (chưa tạo/không tìm thấy) | 0 (không đạt) | 1/2/3/4 (Đạt Mức). */
const extractSelfAssessLevel = (content) => {
  if (!content) return null;
  // Ưu tiên tìm trong phần "5. Tự đánh giá" (block cuối)
  const blocks = content.split(/\*\*\s*5[.\s]*Tự\s*đánh\s*giá\s*\**/i);
  const text = blocks.length > 1 ? blocks[blocks.length - 1].slice(0, 400) : content.slice(-400);
  if (/không\s*đạt/i.test(text)) {
    // Check xem có "Đạt Mức" không — nếu có thì không phải "không đạt"
    if (!/\bĐạt\s*Mức\s*\d/i.test(text)) return 0;
  }
  const m = text.match(/Đạt\s*Mức\s*(\d)/i) || text.match(/Mức\s*(\d)\b/i);
  return m ? parseInt(m[1]) : null;
};

const callBackend = async (url, body) => {
  if (!url) throw new Error('Chưa cấu hình URL Apps Script backend.');
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
    redirect: 'follow'
  });
  if (!res.ok) throw new Error('Kết nối backend thất bại: HTTP ' + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Backend trả về lỗi không xác định');
  return data;
};

function sanitize(s) {
  if (!s) return '';
  let t = String(s).trim();
  const preambles = [
    /^[\s\S]{0,400}?(?:Chắc chắn rồi|Được thôi|Vâng|Dạ)[.,:!\s]+/i,
    /^(?:Đây là|Dưới đây là|Sau đây là)\s+(?:dự thảo|nội dung|phần|bản|báo cáo)[^.\n]{0,200}\.\s*/i,
    /^Tôi (?:sẽ|xin) (?:viết|soạn|trình bày)[^.\n]{0,200}\.\s*/i
  ];
  for (const p of preambles) { const m = t.match(p); if (m && m[0].length < 500) t = t.replace(p, '').trim(); }
  t = t.replace(/^#{1,6}\s*\**\s*(?:PHẦN\s+[IVX]+[.:\s]*)?BÁO\s*CÁO\s*TỰ\s*ĐÁNH\s*GIÁ\**\s*$/gim, '');
  t = t.replace(/^\**\s*Năm\s*học\s*:\s*\d{4}\s*[-–]\s*\d{4}\s*\**\s*\.?\s*$/gim, '');
  t = t.replace(/^\s*Trường\s*(Tiểu học|Mầm non|THCS|THPT)\s*[:.][^\n]*$/gim, '');
  t = t.replace(/^\*\*\s*Trường\s*(Tiểu học|Mầm non|THCS|THPT)\b[^\n]*\*\*\s*\.?\s*$/gim, '');
  t = t.replace(/^\s*[-*_]{3,}\s*$/gm, '');
  t = t.replace(/```[\s\S]*?```/g, s => s.replace(/```/g, ''));
  t = t.replace(/\n{3,}/g, '\n\n');
  return t.trim();
}

/* Helper: Uppercase tiếng Việt chuẩn Unicode.
   MS Word BUG với CSS `text-transform:uppercase` và ký tự Việt có dấu
   (ụ, ọ, ế, ặ…) — Word không chuyển hoa đúng ra "DụC", "HọC".
   Giải pháp: pre-uppercase trong JS bằng toLocaleUpperCase('vi-VN').
   CSS text-transform vẫn giữ trên SCREEN (preview) vì browser xử lý đúng. */
const U = (s) => String(s || '').toLocaleUpperCase('vi-VN');

/* Tự động chèn hyperlink vào các mã minh chứng [Hx-x.x-yy].
   NGUỒN data (2 loại, ưu tiên thứ tự):
     1. `evidence[]` — CRUD structured (field fileUrl)
     2. `evidenceListText` — textarea text có inline URL, format ví dụ:
          [H1-1.1-01] Kế hoạch chiến lược 2021-2025 · https://drive.google.com/file/d/...
          [H1-1.1-02] Quyết định phê duyệt (https://drive.google.com/...)
          [H1-1.1-03] Mô tả không có link  ← sẽ không auto-link
   Output:
     - Mã có link → <a class="mc-link" href="...">...</a>
     - Mã không có link → <span class="mc-code-nolink" title="Chưa có link file — thêm ở tab 🗂 Minh chứng">...</span>
   Security: chỉ chấp nhận http(s) URL. Title escape để chống XSS. */
const _isSafeHttpUrl = (url) => typeof url === 'string' && /^https?:\/\/[^\s<>"']+$/i.test(url.trim());
const autoLinkEvidence = (text, evidence, evidenceListText) => {
  if (!text) return text;
  const evMap = {};
  // Nguồn 1: evidence[] CRUD (ưu tiên)
  if (Array.isArray(evidence)) {
    evidence.forEach(e => {
      if (e && e.code && _isSafeHttpUrl(e.fileUrl)) {
        evMap[e.code] = { url: e.fileUrl.trim(), title: e.title || '' };
      }
    });
  }
  // Nguồn 2: parse URL inline trong evidenceList textarea
  if (typeof evidenceListText === 'string' && evidenceListText.trim()) {
    evidenceListText.split('\n').forEach(line => {
      const codeMatch = line.match(/(\[H\d+-\d+\.\d+-\d+\])/);
      if (!codeMatch) return;
      const code = codeMatch[1];
      if (evMap[code]) return;  // đã có từ nguồn 1, ưu tiên
      const urlMatch = line.match(/(https?:\/\/[^\s)"'<>]+)/);
      if (!urlMatch) return;
      // Tên = phần giữa mã và URL
      const afterCode = line.slice(line.indexOf(code) + code.length);
      const beforeUrl = afterCode.slice(0, afterCode.indexOf(urlMatch[1]));
      const title = beforeUrl.replace(/^[\s·|,\-(]+|[\s)]+$/g, '').trim();
      evMap[code] = { url: urlMatch[1], title };
    });
  }
  // Tổng hợp: replace mọi mã trong text
  return text.replace(/\[H\d+-\d+\.\d+-\d+\]/g, (match) => {
    const ev = evMap[match];
    if (ev) {
      const safeTitle = String(ev.title || '').replace(/"/g, '&quot;').replace(/[<>]/g, '');
      const tooltip = safeTitle ? `${match} — ${safeTitle}` : match;
      return `<a href="${ev.url}" target="_blank" rel="noopener noreferrer" class="mc-link" title="${tooltip}">${match}</a>`;
    }
    // Mã chưa có link → span với tooltip nhắc user thêm
    return `<span class="mc-code-nolink" title="Chưa có link file Drive cho ${match} — bấm tab 🗂 Minh chứng để thêm">${match}</span>`;
  });
};

const mdToHtml = (md, evidence, evidenceListText) => {
  if (!md) return '<p class="placeholder">[CHƯA TẠO NỘI DUNG]</p>';
  let t = md;
  t = t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Render bảng markdown | ... | (TRƯỚC khi xử lý heading/bold để bảo toàn cấu trúc)
  t = t.replace(
    /(?:^\|[^\n]+\|[ \t]*\n)(?:\|[ \t:\-]+\|[ \t]*\n)((?:\|[^\n]+\|[ \t]*\n?)+)/gm,
    (match) => {
      const rawLines = match.trim().split('\n').filter(l => l.trim().startsWith('|'));
      if (rawLines.length < 2) return match;
      const splitRow = (l) => l.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
      const header = splitRow(rawLines[0]);
      const isSep = /^[\s:\-|]+$/.test(rawLines[1]);
      const bodyRows = rawLines.slice(isSep ? 2 : 1).map(splitRow);
      let html = '<table>';
      html += '<tr>' + header.map(c => `<th>${c}</th>`).join('') + '</tr>';
      bodyRows.forEach(r => { html += '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>'; });
      html += '</table>';
      return '\n' + html + '\n';
    }
  );

  t = t.replace(/^#{1,6}\s+(.+)$/gm, '<h4>$1</h4>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  t = t.replace(/__(.+?)__/g, '<b>$1</b>');
  t = t.replace(/(^|[^*])\*([^*\n]+?)\*([^*]|$)/g, '$1<i>$2</i>$3');
  const lines = t.split('\n');
  let out = '';
  for (const raw of lines) {
    const l = raw.trim();
    if (!l) continue;
    if (/^<(h[1-6]|table|ul|hr|div|p|tr|td|th|\/table|\/tr)/.test(l)) { out += l; continue; }
    if (/^[-•*+]\s+/.test(l)) {
      out += '<p class="dash">- ' + l.replace(/^[-•*+]\s+/, '') + '</p>';
    } else {
      out += '<p>' + l + '</p>';
    }
  }
  // Cuối cùng: auto-link mã minh chứng [Hx-x.x-yy] → <a href> nếu có fileUrl
  return autoLinkEvidence(out, evidence, evidenceListText);
};

/* Tính "Bảng tổng hợp kết quả" bằng cách parse "Đạt Mức X" / "Không đạt"
   từ nội dung tự đánh giá đã sinh cho từng tiêu chí. */
const buildBangTongHopHtml = (data) => {
  let h = `<table style="width:100%">`;
  h += `<tr><th rowspan="2" style="width:32%">Tiêu chuẩn, tiêu chí</th><th rowspan="2" style="width:12%">Không đạt</th><th colspan="4" style="text-align:center">Đạt</th></tr>`;
  h += `<tr><th style="width:14%">Mức 1</th><th style="width:14%">Mức 2</th><th style="width:14%">Mức 3</th><th style="width:14%">Mức 4</th></tr>`;
  let stats = { notReached: 0, m1: 0, m2: 0, m3: 0, m4: 0, unknown: 0, total: 0 };
  STANDARDS.forEach(std => {
    h += `<tr><td colspan="6" style="background:#f1f5f9;font-weight:bold">Tiêu chuẩn ${std.id}: ${std.name}</td></tr>`;
    std.criteria.forEach(cr => {
      const lvl = extractSelfAssessLevel((data.generated||{})[`tc-${std.id}-${cr.num}`]?.content);
      stats.total++;
      const mark = (c) => `<td style="text-align:center">${c ? '✕' : ''}</td>`;
      h += `<tr>`;
      h += `<td>Tiêu chí ${std.id}.${cr.num}: ${cr.name}</td>`;
      if (lvl === 0) { stats.notReached++; h += mark(true) + mark(false) + mark(false) + mark(false) + mark(false); }
      else if (lvl === 1) { stats.m1++; h += mark(false) + mark(true) + mark(false) + mark(false) + mark(false); }
      else if (lvl === 2) { stats.m2++; h += mark(false) + mark(false) + mark(true) + mark(false) + mark(false); }
      else if (lvl === 3) { stats.m3++; h += mark(false) + mark(false) + mark(false) + mark(true) + mark(false); }
      else if (lvl === 4) { stats.m4++; h += mark(false) + mark(false) + mark(false) + mark(false) + mark(true); }
      else { stats.unknown++; h += `<td colspan="5" style="text-align:center;color:#94a3b8;font-style:italic">[chưa tự đánh giá]</td>`; }
      h += `</tr>`;
    });
  });
  h += `</table>`;
  // Tổng kết
  const attained = stats.m1 + stats.m2 + stats.m3 + stats.m4;
  const reached = stats.m4 > 0 && stats.m4 + stats.m3 + stats.m2 + stats.m1 === stats.total && stats.notReached === 0 ? 4
    : stats.m3 > 0 && stats.m3 + stats.m2 + stats.m1 === stats.total - stats.m4 && stats.notReached === 0 ? 3
    : stats.m2 > 0 && stats.m2 + stats.m1 === stats.total - stats.m3 - stats.m4 && stats.notReached === 0 ? 2
    : stats.notReached === 0 && attained === stats.total ? 1
    : 0;
  h += `<p style="margin-top:12pt"><b>Thống kê:</b> ${stats.total} tiêu chí · ${attained} đạt · ${stats.notReached} không đạt · ${stats.unknown} chưa đánh giá.</p>`;
  h += `<p><b>Kết luận:</b> Trường ${reached > 0 ? `đạt <b>Mức ${reached}</b>` : '<b>[cần hoàn thiện đánh giá]</b>'}.</p>`;
  return h;
};

/* Render Phần IV — Phụ lục: parse evidenceList thành danh sách theo tiêu chí. */
const buildPhuLucHtml = (data) => {
  const list = (data.sources?.evidenceList || '').trim();
  if (!list) return `<p style="color:#94a3b8;font-style:italic">[Chưa có danh mục minh chứng. Hãy bấm 🗂 Tư liệu ở thanh tiêu đề để bổ sung.]</p>`;

  // Build map mã → fileUrl từ evidence[] + parse URL trong evidenceList text
  const evMap = {};
  (data.evidence || []).forEach(e => {
    if (e.code && _isSafeHttpUrl(e.fileUrl)) evMap[e.code] = e.fileUrl.trim();
  });
  list.split('\n').forEach(line => {
    const cm = line.match(/(\[H\d+-\d+\.\d+-\d+\])/);
    if (!cm || evMap[cm[1]]) return;
    const um = line.match(/(https?:\/\/[^\s)"'<>]+)/);
    if (um) evMap[cm[1]] = um[1];
  });
  // Wrap code thành <a href> nếu có Drive link
  const linkCode = (code) => {
    const url = evMap[code];
    return url
      ? `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:#0c5da5;text-decoration:underline">${code}</a>`
      : code;
  };

  // Group by tiêu chí (mã Hx-x.x-xx)
  const grouped = {};
  list.split('\n').forEach(line => {
    const l = line.trim();
    if (!l) return;
    const m = l.match(/\[H(\d)-(\d+\.\d+)-(\d+)\]\s*(.+)/);
    if (m) {
      const key = `${m[1]}.${m[2].split('.')[1]}`; // e.g. "1.1"
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push({ code: `[H${m[1]}-${m[2]}-${m[3]}]`, desc: m[4] });
    } else {
      if (!grouped['_other']) grouped['_other'] = [];
      grouped['_other'].push({ code: '', desc: l });
    }
  });

  let h = `<p><b>I. Danh mục minh chứng theo từng tiêu chí</b></p>`;
  STANDARDS.forEach(std => {
    let stdHtml = '';
    std.criteria.forEach(cr => {
      const key = `${std.id}.${cr.num}`;
      const items = grouped[key];
      if (items && items.length > 0) {
        stdHtml += `<p style="margin-top:6pt"><i>Tiêu chí ${key}: ${cr.name}</i></p>`;
        items.forEach(it => {
          stdHtml += `<p class="dash">- <b>${linkCode(it.code)}</b> ${it.desc}</p>`;
        });
      }
    });
    if (stdHtml) {
      h += `<p style="margin-top:10pt"><b>Tiêu chuẩn ${std.id}: ${std.name}</b></p>` + stdHtml;
    }
  });
  if (grouped['_other'] && grouped['_other'].length > 0) {
    h += `<p style="margin-top:10pt"><b>Các minh chứng khác</b></p>`;
    grouped['_other'].forEach(it => { h += `<p class="dash">- ${it.desc}</p>`; });
  }

  // Bảng mã hóa tổng hợp
  h += `<p class="center no-indent page-break">&nbsp;</p>`;
  h += `<p><b>II. Bảng mã hóa minh chứng (tổng hợp)</b></p>`;
  h += `<table style="width:100%"><tr><th style="width:18%">Mã minh chứng</th><th>Tên minh chứng</th></tr>`;
  list.split('\n').forEach(line => {
    const l = line.trim();
    if (!l) return;
    const m = l.match(/(\[H\d-\d+\.\d+-\d+\])\s*(.+)/);
    if (m) h += `<tr><td style="font-family:'Consolas',monospace">${linkCode(m[1])}</td><td>${m[2]}</td></tr>`;
  });
  h += `</table>`;
  return h;
};

  const saveEdit = () => {

    setData(d => ({ ...d, generated: { ...d.generated, [editing]: { status: 'done', content: editBuf, updatedAt: new Date().toISOString() } } }));
    setEditing(null);
    showToast('✓ Đã lưu chỉnh sửa');
  };
  const cancelEdit = () => setEditing(null);

  const generateOne = async (section) => {
    if (section.kind === 'computed') {
      showToast('ℹ Mục này tự tính — không cần AI tạo.');
      return;
    }
    setGenerating(section.id);
    setData(d => ({ ...d, generated: { ...d.generated, [section.id]: { status: 'generating', content: '' } } }));
    try {

      showToast('✓ AI đã tạo: ' + section.label.slice(0, 40));

      await generateOne(s);
    }
    showToast('🎉 Hoàn thành tạo toàn bộ báo cáo');
  };

  const saveToCloud = async () => {
    if (!(data.schoolInfo||{}).name) { alert('Vui lòng điền tên trường trước khi lưu.'); setModal('school'); return; }
    const id = data.reportId || genReportId(data.schoolInfo);
    showToast('☁ Đang tải lên Drive…');
    try {
      await callBackend(settings.appsScriptUrl, { action: 'saveReport', reportId: id, content: { ...data, reportId: id, savedAt: new Date().toISOString() } });
      setData(d => ({ ...d, reportId: id, savedAt: new Date().toISOString() }));
      showToast('✓ Đã lưu lên Drive');
    } catch (e) { showToast('❌ ' + e.message); }
  };

  const loadFromCloud = async (rid) => {
    try {
      const res = await callBackend(settings.appsScriptUrl, { action: 'loadReport', reportId: rid });
      setData(migrateReport(res.content));  // migrate phòng trường hợp data Drive cũ thiếu field
      setModal(null);
      showToast('✓ Đã tải báo cáo');
    } catch (e) { showToast('❌ ' + e.message); }
  };

  const newReport = () => {
    if (doneSections > 0 && !confirm('Tạo báo cáo MỚI? Dữ liệu hiện tại sẽ bị xoá khỏi máy (nên Lưu Drive trước).')) return;
    setData(emptyReport());
    setActiveId(null);
    setEditing(null);
    showToast('✓ Đã tạo báo cáo trống');
  };

  const exportWord = () => {
    const html = buildFullDocHtml(data);
    const blob = new Blob([html], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `BaoCaoTDG_TH_${((data.schoolInfo||{}).name || 'Truong').replace(/\s+/g, '_')}_${yearStr}.doc`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('⬇ Đang tải xuống file Word');
  };

  return (
    <div className="app">
      <div className="topbar">
        {/* Hamburger — chỉ hiện trên mobile, mở sidebar dàn ý khi ở workspace report */}
        {workspace === 'report' && (
          <button className="hamburger-btn" onClick={() => setMobileSidebar(v => !v)} title="Menu dàn ý">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        )}
        <div className="brand-logo">📚</div>
        <div style={{lineHeight:1.15}}>
          <div className="display brand-title" style={{fontSize:14,fontWeight:700,letterSpacing:'0.02em'}}>HỆ THỐNG KĐCLGD</div>
          <div className="brand-sub" style={{fontSize:10.5,marginTop:2,letterSpacing:'0.03em'}}>TRƯỜNG TIỂU HỌC · TT 17/2018 + TT 22/2024</div>
        </div>
        {/* Workspace tabs — chuyển đổi giữa 4 khu làm việc của hệ thống */}
        <div style={{display:'flex',alignItems:'center',gap:2,marginLeft:14}}>
          <WsTab id="dashboard" active={workspace} onClick={setWorkspace} icon={IHome} label="Tổng quan"/>
          <WsTab id="report"    active={workspace} onClick={setWorkspace} icon={IDoc}  label="Báo cáo TĐG"/>
          <WsTab id="evidence"  active={workspace} onClick={setWorkspace} icon={IClip} label="Minh chứng" badge={data.evidence?.length || null}/>
          <WsTab id="plan"      active={workspace} onClick={setWorkspace} icon={ICal}  label="Kế hoạch"/>
        </div>
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'flex-end',gap:10,paddingRight:6}}>
          <button className="sch-pill" onClick={() => setModal('school')} title="Chỉnh thông tin trường">
            <ISchool className="w-3.5 h-3.5"/>
            <span style={{fontWeight:500,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(data.schoolInfo||{}).name || 'Chưa đặt tên trường'}</span>
            <span style={{opacity:0.7}}>· {yearStr}</span>
          </button>
        </div>
        <div className="save-status">
          {generating ? <><ILoad className="w-3.5 h-3.5 animate-spin"/> AI đang viết…</>
            : data.savedAt ? <>✓ Drive {new Date(data.savedAt).toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' })}</>
            : <>💾 Tự lưu máy</>}
        </div>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          {/* Nút chính luôn hiện: AI toàn bộ + Xuất */}
          <button className="btn btn-soft btn-xs" onClick={generateAll} disabled={!!generating} title="Dùng AI viết toàn bộ">
            <ISpark className="w-3.5 h-3.5"/> <span className="tb-hide-sm">AI toàn bộ</span>
          </button>
          <button className="btn btn-xs" onClick={exportWord} title="Xuất file Word .doc">
            <IDown className="w-3.5 h-3.5"/> <span className="tb-hide-sm">Xuất</span>
          </button>
          {/* Các nút phụ — ẩn trên mobile, gom vào overflow menu */}
          <button className="btn btn-xs tb-hide-sm" onClick={() => setModal(active && active.kind === 'tieuchi' ? 'guide' : 'help')} title={active && active.kind === 'tieuchi' ? `Xem chỉ báo cho: ${active.label}` : 'Hướng dẫn chi tiết toàn hệ thống'}>
            <IInfo className="w-3.5 h-3.5"/> {active && active.kind === 'tieuchi' ? `Chỉ báo ${active.meta.standardId}.${active.meta.criterion.num}` : 'Hướng dẫn'}
          </button>
          <button className="btn btn-xs tb-hide-sm" onClick={saveToCloud} title="Lưu lên Drive">
            <ICloudUp className="w-3.5 h-3.5"/>
          </button>
          <button className="btn btn-xs tb-hide-sm" onClick={() => setModal('cloud')} title="Báo cáo trên Drive">
            <IList className="w-3.5 h-3.5"/>
          </button>
          <button className="btn btn-xs tb-hide-sm" onClick={() => setModal('sources')} title="Tư liệu & minh chứng">
            <IFolder className="w-3.5 h-3.5"/>
          </button>
          {/* Overflow menu — chỉ hiện trên mobile (CSS: .tb-more display:none default, block ở ≤768px) */}
          <div className="tb-more">
            <button className="btn btn-xs" onClick={(e) => { e.stopPropagation(); setMoreMenu(v => !v); }} title="Thêm">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
            </button>
            {moreMenu && (
              <div className="tb-more-menu">
                <button onClick={() => { setModal(active && active.kind === 'tieuchi' ? 'guide' : 'help'); setMoreMenu(false); }}>
                  <IInfo className="w-4 h-4"/> {active && active.kind === 'tieuchi' ? `Chỉ báo ${active.meta.standardId}.${active.meta.criterion.num}` : 'Hướng dẫn'}
                </button>
                <button onClick={() => { setModal('school'); setMoreMenu(false); }}><ISchool className="w-4 h-4"/> Thông tin trường</button>
                <button onClick={() => { setModal('sources'); setMoreMenu(false); }}><IFolder className="w-4 h-4"/> Tư liệu &amp; minh chứng</button>
                <button onClick={() => { saveToCloud(); setMoreMenu(false); }}><ICloudUp className="w-4 h-4"/> Lưu lên Drive</button>
                <button onClick={() => { setModal('cloud'); setMoreMenu(false); }}><IList className="w-4 h-4"/> Báo cáo trên Drive</button>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* MAIN — layout thay đổi theo workspace đang chọn */}
      {workspace === 'report' && (
        <div className="main">
          <div className={`outline-wrapper ${mobileSidebar ? 'open' : ''}`} style={{display:'contents'}}>
            <OutlineSidebar
              standards={STANDARDS} data={data} ui={ui} setUi={setUi}
              activeId={activeId} onClick={onOutlineClick}
              generating={generating} search={search} setSearch={setSearch}
              pct={pct} done={doneSections} total={totalSections}
              onNew={newReport}
              mobileOpen={mobileSidebar}
            />
          </div>
          {/* Backdrop mobile — click đóng sidebar */}
          {mobileSidebar && <div className="mobile-backdrop" onClick={() => setMobileSidebar(false)}/>}
          <div className="doc-scroll" ref={docScrollRef}>
            <div className="doc-wrap">
              <div className="doc-page">
                <DocumentView
                  data={data} standards={STANDARDS} sections={sections}
                  activeId={activeId} setActiveId={setActiveId}
                  editing={editing} editBuf={editBuf} setEditBuf={setEditBuf}
                  startEdit={startEdit} saveEdit={saveEdit} cancelEdit={cancelEdit}
                  generating={generating} generateOne={generateOne}
                  yearStr={yearStr}
                />
              </div>
              <div style={{textAlign:'center',marginTop:28,color:'var(--faint)',fontSize:11}}>
                Căn cứ: TT 17/2018 · TT 22/2024 · CV 5932/BGDĐT-QLCL · TT 13/2020 (sửa bởi TT 23/2024) &nbsp;·&nbsp; KĐCLGD-TH v2.0
              </div>
            </div>
          </div>
        </div>
      )}
      {workspace === 'dashboard' && (
        <DashboardWorkspace data={data} setData={setData} standards={STANDARDS}
          sections={sections} aiSections={aiSections}
          setWorkspace={setWorkspace} setModal={setModal} setActiveId={setActiveId}
          generateAll={generateAll} generating={generating} saveToCloud={saveToCloud} exportWord={exportWord}/>
      )}
      {workspace === 'evidence' && (
        <EvidenceWorkspace data={data} setData={setData} standards={STANDARDS} showToast={showToast}/>
      )}
      {workspace === 'plan' && (
        <PlanWorkspace data={data} setData={setData} showToast={showToast}/>
      )}

      {modal === 'school' && <SchoolInfoModal schoolInfo={data.schoolInfo} onSave={(info) => { setData(d => ({ ...d, schoolInfo: info })); setModal(null); showToast('✓ Đã cập nhật'); }} onClose={() => setModal(null)}/>}
      {modal === 'sources' && <SourcesModal sources={data.sources} settings={settings} onSave={(s) => { setData(d => ({ ...d, sources: s })); setModal(null); showToast('✓ Đã cập nhật tư liệu'); }} onClose={() => setModal(null)}/>}
      {modal === 'cloud' && <CloudModal settings={settings} onLoad={loadFromCloud} onClose={() => setModal(null)}/>}
      {modal === 'guide' && <GuideModal active={active} activeGen={activeGen} data={data} generating={generating}
        generateOne={(s) => { generateOne(s); setModal(null); }}
        startEdit={(id) => { startEdit(id); setModal(null); }}
        onClose={() => setModal(null)}/>}
      {modal === 'help' && <HelpModal setWorkspace={setWorkspace} setModal={setModal} onClose={() => setModal(null)}/>}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

/* ============================================================
   OUTLINE SIDEBAR
============================================================ */
function OutlineSidebar({ standards, data, ui, setUi, activeId, onClick, generating, search, setSearch, pct, done, total, onNew, mobileOpen }) {
  const statusOf = (id) => {
    if (generating === id) return 'gen';
    const g = (data.generated||{})[id];
    if (g?.status === 'done') return 'done';
    if (g?.status === 'error') return 'err';
    return '';
  };
  const toggleStd = (id) => setUi(u => ({ ...u, openStd: { ...u.openStd, [id]: !u.openStd[id] } }));
  const matchSearch = (txt) => !search || txt.toLowerCase().includes(search.toLowerCase());

  return (
    <div className={`outline ${mobileOpen ? 'open' : ''}`}>
      <div className="outline-h">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div style={{fontSize:12,color:'#fff',fontWeight:600,letterSpacing:'0.02em'}}>📋 Dàn ý</div>
          <button className="btn btn-xs btn-ghost" onClick={onNew} title="Báo cáo mới" style={{color:'rgba(255,255,255,0.9)',background:'rgba(255,255,255,0.1)',borderColor:'transparent'}}><IPlus className="w-3 h-3"/></button>
        </div>
        <input className="outline-search" placeholder="🔍 Tìm tiêu chí…" value={search} onChange={e => setSearch(e.target.value)}/>
        <div style={{marginTop:10}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--sb-ink-muted)',marginBottom:4}}>
            <span>{done}/{total} mục</span>
            <span style={{fontWeight:600,color:'#bbf7d0'}}>{pct}%</span>
          </div>
          <div className="progress-bar"><div style={{width:`${pct}%`}}/></div>
        </div>
      </div>

      <div style={{padding:'8px 0 24px'}}>
        <div className="ol-section">Đầu báo cáo</div>
        <div className={`ol-item ${activeId==='bangtonghop'?'active':''} done`} onClick={() => onClick('bangtonghop')}>
          <span className="dot"></span><span style={{flex:1,fontStyle:'italic',opacity:0.92}}>📊 Bảng tổng hợp kết quả</span>
        </div>
        <div className={`ol-item ${activeId==='coso'?'active':''} ${statusOf('coso')}`} onClick={() => onClick('coso')}>
          <span className="dot"></span><span style={{flex:1}}>Phần I. Cơ sở dữ liệu</span>
        </div>
        <div className={`ol-item ${activeId==='datvande'?'active':''} ${statusOf('datvande')}`} onClick={() => onClick('datvande')}>
          <span className="dot"></span><span style={{flex:1}}>A. Đặt vấn đề</span>
        </div>

        <div className="ol-section">B. Tự đánh giá theo tiêu chuẩn</div>
        {standards.map(std => {
          const open = ui.openStd[std.id];
          const visible = std.criteria.filter(cr => matchSearch(`${std.id}.${cr.num} ${cr.name}`));
          if (search && visible.length === 0) return null;
          const modauId = `std-${std.id}-modau`;
          const ketluanId = `std-${std.id}-ketluan`;
          const doneCr = std.criteria.filter(cr => (data.generated||{})[`tc-${std.id}-${cr.num}`]?.status === 'done').length
            + ((data.generated||{})[modauId]?.status === 'done' ? 1 : 0)
            + ((data.generated||{})[ketluanId]?.status === 'done' ? 1 : 0);
          const totalCr = std.criteria.length + 2;
          return (
            <div key={std.id}>
              <div className={`ol-group ${open?'open':''}`} onClick={() => toggleStd(std.id)}>
                <IChev className="w-3 h-3 chev"/>
                <span style={{flex:1}}>TC {std.id}. {std.name}</span>
                <span style={{fontSize:11,color:'var(--sb-faint)',fontWeight:400}}>{doneCr}/{totalCr}</span>
              </div>
              <div className={`ol-tree ${open||search?'open':''}`}>
                <div className={`ol-item indent ${activeId===modauId?'active':''} ${statusOf(modauId)}`} onClick={() => onClick(modauId)}>
                  <span className="dot"></span>
                  <span style={{flex:1,fontStyle:'italic',opacity:0.9}}>— Mở đầu</span>
                </div>
                {visible.map(cr => {
                  const id = `tc-${std.id}-${cr.num}`;
                  return (
                    <div key={cr.num} className={`ol-item indent ${activeId===id?'active':''} ${statusOf(id)}`} onClick={() => onClick(id)}>
                      <span className="dot"></span>
                      <span style={{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={cr.name}>
                        <b>{std.id}.{cr.num}</b> · {cr.name}
                      </span>
                    </div>
                  );
                })}
                <div className={`ol-item indent ${activeId===ketluanId?'active':''} ${statusOf(ketluanId)}`} onClick={() => onClick(ketluanId)}>
                  <span className="dot"></span>
                  <span style={{flex:1,fontWeight:500}}>— Kết luận TC {std.id}</span>
                </div>
              </div>
            </div>
          );
        })}

        <div className="ol-section">Kết thúc</div>
        <div className={`ol-item ${activeId==='ketluan'?'active':''} ${statusOf('ketluan')}`} onClick={() => onClick('ketluan')}>
          <span className="dot"></span><span style={{flex:1}}>Phần III. Kết luận chung</span>
        </div>
        <div className={`ol-item ${activeId==='phuluc'?'active':''} done`} onClick={() => onClick('phuluc')}>
          <span className="dot"></span><span style={{flex:1,fontStyle:'italic',opacity:0.92}}>📎 Phần IV. Phụ lục</span>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   DOCUMENT VIEW
============================================================ */
function DocumentView({ data, standards, sections, activeId, setActiveId, editing, editBuf, setEditBuf, startEdit, saveEdit, cancelEdit, generating, generateOne, yearStr }) {
  const info = data.schoolInfo || {};

  const evidence = data.evidence || [];
  const evidenceListText = (data.sources && data.sources.evidenceList) || '';
  const renderBody = (md) => {
    if (!md) return <div className="doc-placeholder">Chưa có nội dung. Dùng nút <b>✨ Tạo bằng AI</b> ở panel bên phải, hoặc bấm <b>Sửa</b> để viết tay.</div>;
    const parts = [];
    const lines = md.split('\n');
    let buf = [];
    const flush = (key) => {
      if (buf.length === 0) return;
      let p = buf.join('\n');
      p = p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+?)\*/g, '<em>$1</em>');
      p = autoLinkEvidence(p, evidence, evidenceListText);  // tự động chèn <a> cho mã [Hx-x.x-yy] có fileUrl
      parts.push(<p key={key} dangerouslySetInnerHTML={{ __html: p }}/>);
      buf = [];
    };
    lines.forEach((l, i) => {
      if (!l.trim()) { flush('p' + i); return; }
      buf.push(l);
    });
    flush('p-end');
    return parts;
  };

  const SectionBlock = ({ section, children }) => {
    const g = (data.generated||{})[section.id];
    const isEditing = editing === section.id;
    const isGenerating = generating === section.id;
    const isActive = activeId === section.id;

    return (
      <div id={`sec-${section.id}`} className={`doc-section ${isActive?'active':''}`} onClick={(e) => {
        if (e.target.closest('button') || e.target.closest('textarea')) return;
        setActiveId(section.id);
      }}>
        <div className="section-head">
          <div>
            <div className="section-meta">{section.kind === 'tieuchi' ? `TC ${section.meta.standardId}` : 'Mục'}</div>
            {children}
          </div>
          <div className="section-actions">
            {!isEditing && (
              <>
                <button className="btn btn-xs btn-soft" disabled={!!generating} onClick={(e) => { e.stopPropagation(); generateOne(section); }} title={g?.status === 'done' ? 'Tạo lại bằng AI' : 'Tạo bằng AI'}>
                  {isGenerating ? <ILoad className="w-3 h-3 animate-spin"/> : <ISpark className="w-3 h-3"/>}
                  {g?.status === 'done' ? 'AI lại' : 'AI'}
                </button>
                <button className="btn btn-xs" onClick={(e) => { e.stopPropagation(); startEdit(section.id); }} title="Chỉnh sửa thủ công">
                  <IEdit className="w-3 h-3"/> Sửa
                </button>
              </>
            )}
            {isEditing && (
              <>
                <button className="btn btn-xs btn-ghost" onClick={cancelEdit}>Huỷ</button>
                <button className="btn btn-xs btn-primary" onClick={saveEdit}><ISave className="w-3 h-3"/> Lưu</button>
              </>
            )}
          </div>
        </div>
        {isEditing ? (
          <textarea className="edit" value={editBuf} onChange={e => setEditBuf(e.target.value)} autoFocus
            placeholder="Nhập/dán nội dung. Dùng **bold** cho in đậm, dấu - cho danh sách."/>
        ) : (
          <div className="doc-body">
            {isGenerating && <div style={{display:'flex',alignItems:'center',gap:8,padding:14,background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:8,color:'#0369a1',fontSize:13}}>
              <ILoad className="w-4 h-4 animate-spin"/> AI đang soạn thảo… Mỗi phần mất ~20-40 giây.
            </div>}
            {!isGenerating && g?.status === 'error' && <div style={{padding:12,background:'var(--rose-50)',border:'1px solid #fecaca',borderRadius:8,color:'var(--rose)',fontSize:13}}>
              <b>Lỗi:</b> {g.error}
            </div>}
            {!isGenerating && renderBody(g?.content)}
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      <div style={{textAlign:'center',paddingBottom:20,borderBottom:'1px solid var(--line-soft)',marginBottom:24,fontFamily:"'Times New Roman',serif"}}>
        <div style={{fontSize:'13pt',fontWeight:'bold',color:'var(--ink)'}}>UBND {info.ward ? U(info.ward) : '...'}</div>
        <div style={{fontSize:'14pt',fontWeight:'bold',marginTop:4,color:'var(--ink)'}}>{U(info.name || 'TRƯỜNG ...')}</div>
        <h1 style={{fontFamily:"'Times New Roman',serif",fontSize:'24pt',fontWeight:'bold',margin:'28px 0 8px',color:'var(--ink)',textTransform:'uppercase',letterSpacing:0}}>BÁO CÁO TỰ ĐÁNH GIÁ</h1>
        <div style={{fontSize:'13pt',color:'var(--ink)',fontStyle:'italic'}}>(Kiểm định chất lượng giáo dục — cấp Tiểu học)</div>
        <div style={{marginTop:14,fontSize:'13pt',color:'var(--ink)',fontWeight:'bold',textTransform:'uppercase'}}>
          {info.province || '...'}, NĂM HỌC {yearStr}
        </div>
      </div>

      <ComputedBlock sectionId="bangtonghop" activeId={activeId} setActiveId={setActiveId}
        title="Bảng tổng hợp kết quả tự đánh giá" subtitle="Tự động tính từ kết quả tự đánh giá mỗi tiêu chí"
        body={<BangTongHopView data={data}/>}
      />

      <SectionBlock section={sections.find(s => s.id === 'coso')}>
        <h2 className="doc-h1">Phần I. Cơ sở dữ liệu</h2>
      </SectionBlock>

      <div className="doc-section" style={{marginTop:60}}>
        <div className="section-meta">Phần II</div>
        <h2 className="doc-h1">Tự đánh giá</h2>
      </div>

      <SectionBlock section={sections.find(s => s.id === 'datvande')}>
        <h3 className="doc-h2">A. Đặt vấn đề</h3>
      </SectionBlock>

      <div style={{marginTop:40}}>
        <h3 className="doc-h2">B. Tự đánh giá</h3>
      </div>

      {standards.map(std => (
        <div key={std.id}>
          <div className="doc-section" style={{marginTop:36,padding:'14px 16px',background:'linear-gradient(to right, #f0f9ff, transparent)',borderRadius:8,borderLeft:'3px solid var(--brand)'}}>
            <div className="section-meta" style={{color:'var(--brand-600)'}}>Tiêu chuẩn {std.id}</div>

/* View nhỏ của Bảng tổng hợp trong center preview */
function BangTongHopView({ data }) {
  let total = 0, notReached = 0, m1 = 0, m2 = 0, m3 = 0, m4 = 0, unknown = 0;
  const rows = [];
  STANDARDS.forEach(std => {
    rows.push({ kind: 'std', text: `Tiêu chuẩn ${std.id}: ${std.name}` });
    std.criteria.forEach(cr => {
      const lvl = extractSelfAssessLevel((data.generated||{})[`tc-${std.id}-${cr.num}`]?.content);
      total++;
      if (lvl === 0) notReached++;
      else if (lvl === 1) m1++;
      else if (lvl === 2) m2++;
      else if (lvl === 3) m3++;
      else if (lvl === 4) m4++;
      else unknown++;
      rows.push({ kind: 'cr', text: `Tiêu chí ${std.id}.${cr.num}: ${cr.name}`, lvl });
    });
  });
  const attained = m1 + m2 + m3 + m4;
  const cellStyle = { border:'1px solid var(--line)', padding:'6px 8px', textAlign:'center', fontSize:13 };
  const mark = (on) => <td style={cellStyle}>{on ? <b style={{color:'var(--brand-600)'}}>✕</b> : ''}</td>;
  return (
    <div style={{overflowX:'auto',marginTop:12}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontFamily:"'Times New Roman',serif"}}>
        <thead>
          <tr style={{background:'var(--brand-50)'}}>
            <th rowSpan={2} style={{...cellStyle,textAlign:'left',width:'38%'}}>Tiêu chuẩn / Tiêu chí</th>
            <th rowSpan={2} style={{...cellStyle,width:'12%'}}>Không đạt</th>
            <th colSpan={4} style={cellStyle}>Đạt</th>
          </tr>
          <tr style={{background:'var(--brand-50)'}}>
            <th style={cellStyle}>Mức 1</th><th style={cellStyle}>Mức 2</th><th style={cellStyle}>Mức 3</th><th style={cellStyle}>Mức 4</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => r.kind === 'std' ? (
            <tr key={i}><td colSpan={6} style={{...cellStyle,textAlign:'left',background:'#f1f5f9',fontWeight:600}}>{r.text}</td></tr>
          ) : r.lvl === null ? (
            <tr key={i}><td style={{...cellStyle,textAlign:'left'}}>{r.text}</td><td colSpan={5} style={{...cellStyle,color:'var(--faint)',fontStyle:'italic'}}>[chưa tự đánh giá]</td></tr>
          ) : (
            <tr key={i}>
              <td style={{...cellStyle,textAlign:'left'}}>{r.text}</td>
              {mark(r.lvl === 0)}{mark(r.lvl === 1)}{mark(r.lvl === 2)}{mark(r.lvl === 3)}{mark(r.lvl === 4)}
            </tr>
          ))}
        </tbody>
      </table>
      <p style={{marginTop:14,fontSize:13}}>
        <b>Thống kê:</b> {total} tiêu chí · {attained} đạt · {notReached} không đạt · {unknown} chưa đánh giá
      </p>
      <p style={{fontSize:13}}>
        <b>Kết luận sơ bộ:</b> {unknown === 0 && notReached === 0
          ? <>Trường đạt <b style={{color:'var(--brand-600)'}}>Mức {m4 === total ? 4 : m3+m4 === total ? 3 : m2+m3+m4 === total ? 2 : 1}</b></>
          : <i style={{color:'var(--faint)'}}>Cần hoàn thành tự đánh giá tất cả tiêu chí để có kết luận chính thức.</i>}
      </p>
    </div>
  );
}
