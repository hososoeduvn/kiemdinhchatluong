/* ============================================================
   AUTO-DETECT trạng thái từng bước dựa trên dữ liệu thực tế.
   User có thể override bằng cách tick/untick thủ công (wf.done = true/false).
   Trả về: 'done' | 'auto-done' | 'current' | 'pending'
============================================================ */
const isStepAutoDone = (stepId, data) => {
  const info = data.schoolInfo || {};
  const plan = data.plan || {};
  if (stepId === 1) {
    const council = info.council || [];
    const filled = council.filter(m => m.name && m.name.trim()).length;
    return filled >= 7;
  }
  if (stepId === 2) {
    return !!(plan.purpose && plan.scope && plan.startDate && plan.endDate && plan.methodology);
  }
  if (stepId === 3) {
    const ev = data.evidence || [];
    const evList = (data.sources?.evidenceList || '').split('\n').filter(l => /\[H\d-\d+\.\d+-\d+\]/.test(l));
    return (ev.length + evList.length) >= 30;
  }
  if (stepId === 4) {
    let withLevel = 0, total = 0;
    STANDARDS.forEach(s => s.criteria.forEach(cr => {
      total++;
      if (extractSelfAssessLevel((data.generated||{})[`tc-${s.id}-${cr.num}`]?.content) !== null) withLevel++;
    }));
    return total > 0 && (withLevel / total) >= 0.8;
  }
  if (stepId === 5) {
    const list = buildSectionsList().filter(s => s.kind !== 'computed');
    const done = list.filter(s => (data.generated||{})[s.id]?.status === 'done').length;
    return done === list.length;
  }
  return false;  // step 6, 7 cần user tick thủ công
};

const getStepStatus = (stepId, workflow, data) => {
  const wf = (workflow || []).find(w => w.id === stepId) || {};
  if (wf.done === true) return 'done';
  if (wf.done === false) {
    // User explicitly marked as not done
  } else if (isStepAutoDone(stepId, data)) return 'auto-done';
  // Check nếu là bước hiện tại (các bước trước đã done hoặc auto-done)
  const prevAllDone = (workflow || []).slice(0, stepId - 1).every(w => {
    if (w.done === true) return true;
    if (w.done === false) return false;
    return isStepAutoDone(w.id, data);
  });
  return prevAllDone ? 'current' : 'pending';
};

/* ============================================================
   WORKSPACE: TỔNG QUAN (Dashboard)
   Hiển thị quy trình 7 bước CV 5932, mức độ đạt được so với mục tiêu,
   phân tích điểm cần cải thiện.
============================================================ */
function DashboardWorkspace({ data, setData, standards, sections, aiSections, setWorkspace, setModal, setActiveId, generateAll, generating, saveToCloud, exportWord }) {
  const info = data.schoolInfo || {};
  const workflow = data.workflow || [];

  // Thống kê tiêu chí theo tiêu chuẩn (parse "Đạt Mức X" từ nội dung đã sinh)
  const stdStats = standards.map(std => {
    const levels = std.criteria.map(cr => extractSelfAssessLevel((data.generated||{})[`tc-${std.id}-${cr.num}`]?.content));
    const validLevels = levels.filter(l => l !== null && l >= 1);
    const done = levels.filter(l => l !== null).length;
    const total = std.criteria.length;
    const notReached = levels.filter(l => l === 0).length;
    // Mức đạt của tiêu chuẩn = min của các tiêu chí (nếu tất cả đã đánh giá & không có "không đạt")
    const minLevel = (validLevels.length === total && notReached === 0) ? Math.min(...validLevels) : null;
    return { id: std.id, name: std.name, done, total, validLevels, notReached, minLevel, levels };
  });

  const totalDone = aiSections.filter(s => (data.generated||{})[s.id]?.status === 'done').length;
  const totalAll = aiSections.length;
  const pct = Math.round((totalDone / totalAll) * 100);
  const evidenceCount = (data.evidence || []).length + (data.sources?.evidenceList || '').split('\n').filter(l => /\[H\d-\d+\.\d+-\d+\]/.test(l)).length;
  // Đếm các bước done/auto-done
  const stepStatuses = CV5932_STEPS.map(s => getStepStatus(s.id, workflow, data));
  const completedSteps = stepStatuses.filter(s => s === 'done' || s === 'auto-done').length;
  // Mức đạt chung = min của tất cả 5 TC (hoặc null nếu chưa đủ dữ liệu)
  const allStdLevels = stdStats.map(s => s.minLevel).filter(l => l !== null);
  const overallLevel = allStdLevels.length === 5 ? Math.min(...allStdLevels) : null;
  const targetLevel = info.mucDangKy || 2;
  // TC yếu nhất (kéo mức chung xuống)
  const weakest = stdStats.filter(s => s.minLevel !== null).sort((a,b) => a.minLevel - b.minLevel).slice(0, 2);

  const setStepDone = (stepId, done) => {
    setData(d => ({
      ...d,
      workflow: (d.workflow || []).map(s => s.id === stepId ? {
        ...s, done,
        completedAt: done ? new Date().toISOString().slice(0,10) : ''
      } : s)
    }));
  };

  const [openDetail, setOpenDetail] = useState(null);  // stepId đang mở form chi tiết

  const updateStep = (stepId, field, value) => {
    setData(d => ({
      ...d,
      workflow: (d.workflow || []).map(s => s.id === stepId ? { ...s, [field]: value } : s)
    }));
  };

  // Gợi ý "Bước tiếp theo" thông minh — dựa vào stepStatuses đã auto-detect
  const nextHint = (() => {
    if (!info.name) return { icon: '📍', label: 'Nhập thông tin trường', action: () => setModal('school') };
    const firstIdx = stepStatuses.findIndex(st => st !== 'done' && st !== 'auto-done');
    if (firstIdx === -1) return { icon: '🎉', label: 'Đã hoàn thành cả 7 bước! Xuất báo cáo Word →', action: () => exportWord() };
    const step = CV5932_STEPS[firstIdx];
    const actions = {
      1: { icon: '👥', label: 'Thành lập Hội đồng TĐG', action: () => setModal('school') },
      2: { icon: '📅', label: 'Lập Kế hoạch TĐG', action: () => setWorkspace('plan') },
      3: { icon: '🗂', label: 'Quản lý Minh chứng', action: () => setWorkspace('evidence') },
      4: { icon: '📋', label: 'Đánh giá tiêu chí (tab Báo cáo)', action: () => setWorkspace('report') },
      5: { icon: '✨', label: 'Soạn Báo cáo TĐG (AI hỗ trợ)', action: () => setWorkspace('report') },
      6: { icon: '📢', label: 'Công bố báo cáo (tick khi hoàn tất)', action: () => setStepDone(6, true) },
      7: { icon: '🚀', label: 'Triển khai sau TĐG (tick khi hoàn tất)', action: () => setStepDone(7, true) }
    };
    return { ...actions[step.id], stepNum: step.id, stepName: step.name };
  })();

  return (
    <div className="ws-main">

        {/* 4 stat cards */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
          <div className="ws-stat">
            <div className="ws-stat-label">Tiến độ 7 bước</div>

        {/* Banner "Bước tiếp theo" */}

            <h3 className="ws-card-h" style={{justifyContent:'space-between'}}>
              <span style={{display:'flex',alignItems:'center',gap:8}}><IClip className="w-4 h-4" style={{color:'var(--brand-600)'}}/> Mức độ đạt được</span>
              <span style={{fontSize:10.5,fontWeight:500,color:'var(--faint)',fontStyle:'italic'}}>Tự tính · sửa ở tab Báo cáo</span>
            </h3>

            {/* ============ KHỐI 1: Mục tiêu vs Thực tế ============ */}
            <div className="sep-dashed"><span>🎯 Mục tiêu vs Thực tế</span></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1px 1fr',gap:14,padding:'18px 20px',background:'linear-gradient(135deg,var(--brand-50),#fff)',borderRadius:12,border:'1px solid var(--brand-100)',alignItems:'center'}}>
              <div>
                <div style={{fontSize:10.5,color:'var(--faint)',textTransform:'uppercase',letterSpacing:'0.06em',fontWeight:600,marginBottom:2}}>🎯 Mục tiêu đăng ký</div>
                <div style={{fontSize:34,fontWeight:700,color:'var(--brand-600)',lineHeight:1.05,fontFamily:"'Inter',sans-serif"}}>Mức {targetLevel}</div>
                <div style={{fontSize:11.5,color:'var(--ink-muted)',marginTop:3}}>
                  {targetLevel === 1 ? 'KĐCLGD Mức 1' : targetLevel === 2 ? 'KĐCLGD Mức 2' : targetLevel === 3 ? 'Chuẩn QG Mức 1' : 'Chuẩn QG Mức 2'}
                </div>
              </div>
              <div style={{background:'var(--line)',width:1,height:'70%',justifySelf:'center'}}/>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:10.5,color:'var(--faint)',textTransform:'uppercase',letterSpacing:'0.06em',fontWeight:600,marginBottom:2}}>📊 Thực tế đạt được</div>
                <div style={{fontSize:34,fontWeight:700,lineHeight:1.05,fontFamily:"'Inter',sans-serif",color: overallLevel === null ? 'var(--faint)' : overallLevel >= targetLevel ? '#15803d' : '#b45309'}}>
                  {overallLevel === null ? '—' : `Mức ${overallLevel}`}
                </div>
                <div style={{fontSize:11.5,color:'var(--ink-muted)',marginTop:3}}>
                  {overallLevel === null ? 'Chưa đủ dữ liệu' : overallLevel >= targetLevel ? '✓ Đã đạt mục tiêu' : `Còn cách ${targetLevel - overallLevel} mức`}
                </div>
              </div>
            </div>

            {/* ============ KHỐI 2: Ma trận 5 TC × 4 Mức ============ */}
            <div className="sep-dashed"><span>📐 Ma trận 5 tiêu chuẩn × 4 mức</span></div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr>
                  <th style={{textAlign:'left',padding:'6px 4px',fontSize:10.5,color:'var(--faint)',fontWeight:600,textTransform:'uppercase'}}>Tiêu chuẩn</th>
                  {[1,2,3,4].map(m => <th key={m} style={{padding:'6px 4px',width:'12%',fontSize:10.5,color:'var(--faint)',fontWeight:600,textTransform:'uppercase'}}>Mức {m}</th>)}
                  <th style={{padding:'6px 4px',width:'14%',fontSize:10.5,color:'var(--faint)',fontWeight:600,textTransform:'uppercase',textAlign:'right'}}>Đạt</th>
                </tr>
              </thead>
              <tbody>
                {stdStats.map(s => {
                  const lvl = s.minLevel;
                  const isWeak = lvl !== null && lvl < targetLevel;
                  return (
                    <tr key={s.id} style={{borderTop:'1px solid var(--line-soft)',background: isWeak ? '#fffbeb' : 'transparent'}}>
                      <td style={{padding:'7px 4px',fontWeight:500}}>
                        <span style={{color:'var(--brand-600)',fontWeight:700}}>TC {s.id}.</span> {s.name.length > 30 ? s.name.slice(0,30)+'…' : s.name}
                      </td>
                      {[1,2,3,4].map(m => {
                        const reached = lvl !== null && lvl >= m;
                        return (
                          <td key={m} style={{textAlign:'center',padding:'6px 4px',fontSize:15,fontWeight:700,color: reached ? '#15803d' : '#cbd5e1'}}>
                            {reached ? '●' : '○'}
                          </td>
                        );
                      })}
                      <td style={{textAlign:'right',padding:'6px 4px',fontWeight:700,fontSize:13,color: lvl === null ? 'var(--faint)' : lvl >= targetLevel ? '#15803d' : '#b45309'}}>
                        {lvl === null ? (s.done < s.total ? `${s.done}/${s.total}` : 'KĐ') : `Mức ${lvl}`}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>

            {/* ============ KHỐI 3: Phân bố 24 tiêu chí theo Mức ============ */}
            {(() => {
              // Đếm phân bố tất cả 24 tiêu chí theo Mức
              const dist = { 0:0, 1:0, 2:0, 3:0, 4:0, unknown:0 };
              standards.forEach(std => std.criteria.forEach(cr => {
                const lvl = extractSelfAssessLevel((data.generated||{})[`tc-${std.id}-${cr.num}`]?.content);
                if (lvl === null) dist.unknown++;
                else dist[lvl]++;
              }));
              const totalCr = 24;
              const rows = [
                { key: 4, label: 'Đạt Mức 4', color: '#059669', count: dist[4] },
                { key: 3, label: 'Đạt Mức 3', color: '#15803d', count: dist[3] },
                { key: 2, label: 'Đạt Mức 2', color: '#0c5da5', count: dist[2] },
                { key: 1, label: 'Đạt Mức 1', color: '#0ea5e9', count: dist[1] },
                { key: 0, label: 'Không đạt',  color: '#e11d48', count: dist[0] },
                { key: 'u', label: 'Chưa đánh giá', color: '#cbd5e1', count: dist.unknown }
              ];
              return (
                <>
                  <div className="sep-dashed"><span>📊 Phân bố 24 tiêu chí theo Mức</span></div>
                  <div>
                    {rows.map(r => (
                      <div key={r.key} className="dist-row">
                        <div className="dist-label">{r.label}</div>
                        <div className="dist-bar">
                          <div className="dist-fill" style={{width:`${(r.count / totalCr) * 100}%`,background:r.color,minWidth:r.count > 0 ? 26 : 0}}>
                            {r.count > 0 && r.count}
                          </div>
                        </div>
                        <div className="dist-count">{Math.round((r.count / totalCr) * 100)}%</div>
                      </div>
                    ))}
                  </div>
                </>
              );
            })()}

            {/* ============ KHỐI 4: Tiêu chí cần chú ý ============ */}
            {(() => {
              // Liệt kê tiêu chí có Mức thấp nhất (< targetLevel) hoặc Không đạt hoặc Chưa đánh giá
              const attention = [];
              standards.forEach(std => std.criteria.forEach(cr => {
                const lvl = extractSelfAssessLevel((data.generated||{})[`tc-${std.id}-${cr.num}`]?.content);
                if (lvl === 0) attention.push({ std: std.id, num: cr.num, name: cr.name, lvl, kind: 'notreached' });
                else if (lvl !== null && lvl < targetLevel) attention.push({ std: std.id, num: cr.num, name: cr.name, lvl, kind: 'low' });
              }));
              if (attention.length === 0) return null;
              return (
                <>
                  <div className="sep-dashed"><span>⚠ Tiêu chí cần chú ý</span></div>
                  <div style={{fontSize:12,color:'var(--ink-muted)',lineHeight:1.65,marginBottom:8}}>
                    {attention.length} tiêu chí đang thấp hơn mục tiêu <b>Mức {targetLevel}</b>. Click để mở chỉ báo:
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {attention.slice(0, 12).map(a => (
                      <button key={`${a.std}.${a.num}`} className="btn btn-xs" style={{background: a.kind === 'notreached' ? 'var(--rose-50)' : '#fffbeb',borderColor: a.kind === 'notreached' ? '#fecaca' : '#fde68a',color: a.kind === 'notreached' ? 'var(--rose)' : '#b45309'}}
                        onClick={() => { setActiveId(`tc-${a.std}-${a.num}`); setWorkspace('report'); }}
                        title={`${a.name} — ${a.kind === 'notreached' ? 'KHÔNG ĐẠT' : `Đạt Mức ${a.lvl}`}`}>
                        TC {a.std}.{a.num} · {a.kind === 'notreached' ? 'KĐ' : `M${a.lvl}`}
                      </button>
                    ))}
                    {attention.length > 12 && <span style={{fontSize:11,color:'var(--faint)',alignSelf:'center'}}>…và {attention.length - 12} tiêu chí khác</span>}
                  </div>
                </>
              );
            })()}

            {/* ============ KHỐI 5: Đề xuất hành động ============ */}
            <div className="sep-dashed"><span>💡 Đề xuất tiếp theo</span></div>
            {weakest.length > 0 && overallLevel !== null && overallLevel < targetLevel && (
              <div style={{padding:'12px 14px',background:'#fffbeb',borderRadius:8,border:'1px solid #fde68a',marginBottom:10}}>
                <div style={{fontSize:12.5,color:'var(--ink)',lineHeight:1.6}}>
                  Mức chung bị <b>TC {weakest[0].id}</b> (Mức {weakest[0].minLevel}) kéo xuống. Muốn đạt <b>Mức {targetLevel}</b>, cần nâng các tiêu chí thuộc TC này lên Mức {targetLevel}.
                </div>
              </div>
            )}
            {overallLevel !== null && overallLevel >= targetLevel && (
              <div style={{padding:'12px 14px',background:'#f0fdf4',borderRadius:8,border:'1px solid #86efac',marginBottom:10}}>
                <div style={{fontSize:12.5,color:'var(--ink)',lineHeight:1.6}}>
                  🎉 Nhà trường đạt <b>Mức {overallLevel}</b>, đáp ứng đăng ký <b>Mức {targetLevel}</b>. Tiếp tục sang Bước 5-6: hoàn thiện báo cáo và công bố.
                </div>
              </div>
            )}
            {overallLevel === null && (
              <div style={{padding:'12px 14px',background:'#f8fafc',borderRadius:8,border:'1px solid var(--line)',fontSize:12.5,color:'var(--ink-muted)',lineHeight:1.6,marginBottom:10}}>
                <b style={{color:'var(--ink)'}}>Cần hoàn tất tự đánh giá</b> tất cả 24 tiêu chí để hệ thống tính được Mức chung. Tiến độ hiện tại: <b>{totalDone}/{totalAll}</b> mục ({pct}%).
              </div>
            )}
            <div style={{display:'flex',gap:8,marginTop:4}}>
              <button className="btn btn-primary btn-xs" style={{flex:1,justifyContent:'center'}} onClick={() => setWorkspace('report')}>
                <IDoc className="w-3.5 h-3.5"/> Mở tab Báo cáo TĐG để sửa
              </button>
              <button className="btn btn-xs" onClick={generateAll} disabled={!!generating}>
                <ISpark className="w-3.5 h-3.5"/> AI sinh phần còn thiếu
              </button>
            </div>
          </div>
        </div>

        {/* Quick actions */}
        <div className="ws-card" style={{marginTop:20}}>
          <h3 className="ws-card-h"><ISpark className="w-4 h-4" style={{color:'var(--brand-600)'}}/> Hành động nhanh</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))',gap:10}}>
            <button className="btn btn-primary" onClick={generateAll} disabled={!!generating}><ISpark className="w-4 h-4"/> AI tạo toàn bộ báo cáo</button>
            <button className="btn" onClick={() => setWorkspace('report')}><IDoc className="w-4 h-4"/> Sang Báo cáo TĐG</button>
            <button className="btn" onClick={() => setWorkspace('evidence')}><IClip className="w-4 h-4"/> Quản lý minh chứng</button>
            <button className="btn" onClick={() => setWorkspace('plan')}><ICal className="w-4 h-4"/> Lập kế hoạch TĐG</button>
            <button className="btn" onClick={() => setModal('school')}><ISchool className="w-4 h-4"/> Thông tin trường & Hội đồng</button>
            <button className="btn" onClick={() => setModal('sources')}><IFolder className="w-4 h-4"/> Tư liệu & minh chứng</button>
            <button className="btn" onClick={saveToCloud}><ICloudUp className="w-4 h-4"/> Lưu lên Drive</button>
            <button className="btn" onClick={exportWord}><IDown className="w-4 h-4"/> Xuất báo cáo Word</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   WORKSPACE: MINH CHỨNG
   Quản lý minh chứng dạng CRUD table (thay cho textarea thuần).
   Tự đồng bộ sang sources.evidenceList để AI sử dụng khi sinh báo cáo.
============================================================ */
function EvidenceWorkspace({ data, setData, standards, showToast }) {
  const [search, setSearch] = useState('');
  const [filterStd, setFilterStd] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [editItem, setEditItem] = useState(null);

  const evidence = data.evidence || [];

  // Import từ evidenceList text (nếu evidence[] rỗng và sources có nội dung)
  const importFromText = () => {
    const text = data.sources?.evidenceList || '';
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const items = [];
    lines.forEach(l => {
      const m = l.match(/\[H(\d)-(\d+)\.(\d+)-(\d+)\]\s*(.+)/);
      if (m) {
        items.push({
          id: `ev_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
          code: `[H${m[1]}-${m[2]}.${m[3]}-${m[4]}]`,
          title: m[5].trim(),
          standardId: parseInt(m[1]),
          criterionNum: parseInt(m[3]),
          source: '', collectedBy: '', collectedAt: '', fileUrl: '', status: 'pending', note: ''
        });
      }
    });
    if (items.length === 0) { showToast('Không tìm thấy mã [Hx-x.x-xx] trong text'); return; }
    setData(d => ({ ...d, evidence: [...(d.evidence || []), ...items] }));
    showToast(`✓ Đã import ${items.length} minh chứng`);
  };

  // Export ra text để AI dùng
  const syncToText = () => {
    const text = evidence.map(e => `${e.code} ${e.title}`).join('\n');
    setData(d => ({ ...d, sources: { ...d.sources, evidenceList: text } }));
    showToast('✓ Đã đồng bộ sang Tư liệu (AI sẽ dùng khi sinh báo cáo)');
  };

  const addNew = () => setEditItem({
    id: `ev_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
    code: '', title: '', standardId: 1, criterionNum: 1,
    source: '', collectedBy: '', collectedAt: '', fileUrl: '', status: 'pending', note: '', _isNew: true
  });

  const saveItem = (item) => {
    const { _isNew, ...clean } = item;
    if (_isNew) {
      setData(d => ({ ...d, evidence: [...(d.evidence || []), clean] }));
    } else {
      setData(d => ({ ...d, evidence: (d.evidence || []).map(e => e.id === clean.id ? clean : e) }));
    }
    setEditItem(null);
    showToast('✓ Đã lưu minh chứng');
  };

  const deleteItem = (id) => {
    if (!confirm('Xoá minh chứng này?')) return;
    setData(d => ({ ...d, evidence: (d.evidence || []).filter(e => e.id !== id) }));
    showToast('✓ Đã xoá');
  };

  const filtered = evidence.filter(e => {
    if (filterStd && String(e.standardId) !== filterStd) return false;
    if (filterStatus && e.status !== filterStatus) return false;
    if (search) {
      const s = search.toLowerCase();
      if (!(e.code || '').toLowerCase().includes(s) && !(e.title || '').toLowerCase().includes(s) && !(e.source || '').toLowerCase().includes(s)) return false;
    }
    return true;
  });

  // Thống kê
  const stats = {
    total: evidence.length,
    pending: evidence.filter(e => e.status === 'pending').length,
    collected: evidence.filter(e => e.status === 'collected').length,
    verified: evidence.filter(e => e.status === 'verified').length
  };

  return (
    <div className="ws-main">
      <div className="ws-wrap">
        <h1 className="ws-title">Quản lý minh chứng</h1>
        <p className="ws-subtitle">Danh mục minh chứng có cấu trúc · Mã [Hx-x.x-xx] · Nguồn · Người thu thập · Ngày · File Drive · Trạng thái</p>

        {/* Stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
          <div className="ws-stat"><div className="ws-stat-label">Tổng minh chứng</div><div className="ws-stat-value">{stats.total}</div></div>
          <div className="ws-stat"><div className="ws-stat-label">Đang thu thập</div><div className="ws-stat-value" style={{color:'#b45309'}}>{stats.pending}</div></div>
          <div className="ws-stat"><div className="ws-stat-label">Đã thu thập</div><div className="ws-stat-value" style={{color:'#1e40af'}}>{stats.collected}</div></div>
          <div className="ws-stat"><div className="ws-stat-label">Đã xác minh</div><div className="ws-stat-value" style={{color:'#15803d'}}>{stats.verified}</div></div>
        </div>

        {/* Toolbar */}
        <div className="ev-toolbar">
          <input type="text" placeholder="🔍 Tìm mã, tên, nguồn…" value={search} onChange={e => setSearch(e.target.value)} style={{flex:'1 1 260px',maxWidth:360}}/>
          <select value={filterStd} onChange={e => setFilterStd(e.target.value)}>
            <option value="">Mọi tiêu chuẩn</option>
            {standards.map(s => <option key={s.id} value={s.id}>TC {s.id}: {s.name.slice(0,40)}</option>)}
          </select>
          <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
            <option value="">Mọi trạng thái</option>
            <option value="pending">Đang thu thập</option>
            <option value="collected">Đã thu thập</option>
            <option value="verified">Đã xác minh</option>
          </select>
          <div style={{flex:1}}/>
          <button className="btn btn-xs" onClick={importFromText} title="Import từ Tư liệu (textarea)"><IRefresh className="w-3.5 h-3.5"/> Import từ text</button>
          <button className="btn btn-xs" onClick={syncToText} title="Đồng bộ sang Tư liệu để AI dùng"><IRefresh className="w-3.5 h-3.5"/> Đồng bộ AI</button>
          <button className="btn btn-xs btn-primary" onClick={addNew}><IPlus className="w-3.5 h-3.5"/> Thêm minh chứng</button>
        </div>

        {/* Table */}
        {evidence.length === 0 ? (
          <div className="ev-empty">
            <div style={{fontSize:36,marginBottom:10}}>📂</div>
            <div style={{fontSize:14,marginBottom:8}}>Chưa có minh chứng nào</div>
            <div style={{fontSize:12,marginBottom:16}}>Bấm <b>Import từ text</b> để chuyển danh mục trong Tư liệu sang bảng có cấu trúc, hoặc <b>Thêm minh chứng</b> để nhập mới.</div>
            <div style={{display:'flex',gap:8,justifyContent:'center'}}>
              <button className="btn" onClick={importFromText}><IRefresh className="w-4 h-4"/> Import từ Tư liệu</button>
              <button className="btn btn-primary" onClick={addNew}><IPlus className="w-4 h-4"/> Thêm mới</button>
            </div>
          </div>
        ) : (
          <table className="ev-table">
            <thead>
              <tr>
                <th style={{width:'10%'}}>Mã</th>
                <th style={{width:'28%'}}>Tên minh chứng</th>
                <th style={{width:'8%'}}>TC</th>
                <th style={{width:'14%'}}>Nguồn</th>
                <th style={{width:'12%'}}>Người thu thập</th>
                <th style={{width:'10%'}}>Ngày</th>
                <th style={{width:'10%'}}>Trạng thái</th>
                <th style={{width:'8%'}}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(e => (
                <tr key={e.id} onClick={() => setEditItem(e)} style={{cursor:'pointer'}}>
                  <td><span className="ev-code">{e.code}</span></td>
                  <td>{e.title} {e.fileUrl && <a href={e.fileUrl} target="_blank" rel="noopener" onClick={ev => ev.stopPropagation()} title="Mở file"><ILink className="w-3 h-3 inline"/></a>}</td>
                  <td>{e.standardId}.{e.criterionNum}</td>
                  <td style={{fontSize:12,color:'var(--ink-muted)'}}>{e.source}</td>
                  <td style={{fontSize:12,color:'var(--ink-muted)'}}>{e.collectedBy}</td>
                  <td style={{fontSize:12,color:'var(--ink-muted)'}}>{e.collectedAt}</td>
                  <td><span className={`ev-status ${e.status}`}>{e.status === 'pending' ? 'Đang thu thập' : e.status === 'collected' ? 'Đã thu thập' : 'Đã xác minh'}</span></td>
                  <td><button className="btn btn-icon btn-xs btn-ghost" onClick={ev => { ev.stopPropagation(); deleteItem(e.id); }} title="Xoá"><ITrash className="w-3.5 h-3.5"/></button></td>
                </tr>
              ))}
              {filtered.length === 0 && <tr><td colSpan={8} style={{textAlign:'center',padding:30,color:'var(--faint)',fontStyle:'italic'}}>Không có kết quả phù hợp với bộ lọc.</td></tr>}
            </tbody>
          </table>
        )}

        {editItem && <EvidenceEditModal item={editItem} standards={standards} onSave={saveItem} onClose={() => setEditItem(null)}/>}
      </div>
    </div>
  );
}

function EvidenceEditModal({ item, standards, onSave, onClose }) {
  const [v, setV] = useState({ ...item });
  const std = standards.find(s => s.id === v.standardId);
  const upd = (k, val) => setV(p => ({ ...p, [k]: val }));

  // Auto-format code khi thay đổi standard/criterion
  useEffect(() => {
    if (!v.code || /^\[H\d-\d+\.\d+-\d+\]$/.test(v.code)) {
      // Auto-update if standard matches but criterion different, or empty
      const existing = (v.code || '').match(/-(\d+)\]$/);
      const seq = existing ? existing[1] : '01';
      const newCode = `[H${v.standardId}-${v.standardId}.${v.criterionNum}-${seq}]`;
      if (newCode !== v.code) upd('code', newCode);
    }
  }, [v.standardId, v.criterionNum]);

  return (
    <div className="overlay fadein" onClick={onClose}>
      <div className="modal modal-lg" onClick={e => e.stopPropagation()}>
        <div className="modal-h">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <IClip className="w-5 h-5"/>
            <div className="display" style={{fontSize:18,fontWeight:600}}>{item._isNew ? 'Thêm minh chứng' : 'Chỉnh sửa minh chứng'}</div>
          </div>
          <button className="btn btn-icon btn-ghost" onClick={onClose}><IX className="w-4 h-4"/></button>
        </div>

            <div className="field">
              <label>Ngày thu thập</label>
              <input type="date" value={v.collectedAt} onChange={e => upd('collectedAt', e.target.value)}/>

            <div className="field">
              <label>Trạng thái</label>
              <select value={v.status} onChange={e => upd('status', e.target.value)}>
                <option value="pending">Đang thu thập</option>
                <option value="collected">Đã thu thập</option>
                <option value="verified">Đã xác minh</option>
              </select>
            </div>
          </div>
          <div className="field">
            <label>Ghi chú</label>
            <textarea rows={3} value={v.note} onChange={e => upd('note', e.target.value)} placeholder="Thông tin bổ sung (nếu có)"/>
          </div>
        </div>
        <div className="modal-f">
          <button className="btn btn-ghost" onClick={onClose}>Huỷ</button>
          <button className="btn btn-primary" onClick={() => onSave(v)} disabled={!v.title || !v.code}><ISave className="w-4 h-4"/> Lưu</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   WORKSPACE: KẾ HOẠCH TỰ ĐÁNH GIÁ (Bước 2 CV 5932)
   Form điền kế hoạch TĐG + xuất thành văn bản Word riêng.
============================================================ */

  const plan = data.plan || {};
  const workflow = data.workflow || [];
  const info = data.schoolInfo || {};
  const upd = (k, val) => setData(d => ({ ...d, plan: { ...(d.plan || {}), [k]: val } }));

  const updTimeline = (stepId, field, val) => {
    setData(d => ({
      ...d,
      workflow: (d.workflow || []).map(s => s.id === stepId ? { ...s, [field]: val } : s)
    }));
  };

  const exportPlan = () => {
    const council = info.council || [];
    const chair = council.find(m => (m.role || '').toLowerCase().includes('chủ tịch') && !(m.role || '').toLowerCase().includes('phó')) || {};
    const h = `<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><meta name="ProgId" content="Word.Document"><title>Kế hoạch TĐG - ${info.name || 'Trường Tiểu học'}</title>
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]-->
<style>
@page WordSection1 { size: 21cm 29.7cm; margin: 2cm 2cm 2cm 3cm; }
div.WordSection1 { page: WordSection1; }
body { font-family: 'Times New Roman', serif; font-size: 14pt; line-height: 1.5; }
h1 { text-align: center; font-size: 16pt; font-weight: bold; margin: 14pt 0; }
h2 { font-size: 14pt; font-weight: bold; margin: 12pt 0 6pt; }

p.no-indent { text-indent: 0; }

td, th { border: 1pt solid #000; padding: 4pt 6pt; font-size: 13pt; vertical-align: top; }
th { background: #f1f5f9; font-weight: bold; text-align: center; }
</style></head><body><div class="WordSection1">`;

    let w = h;
    w += `<p class="center no-indent" style="font-size:14pt"><b>UBND ${info.ward ? U(info.ward) : '...'}</b></p>`;
    w += `<p class="center no-indent" style="font-size:15pt"><b>${U(info.name || 'TRƯỜNG ...')}</b></p>`;
    w += `<p class="center no-indent" style="margin-top:6pt">──────</p>`;
    w += `<p class="center no-indent" style="margin-top:14pt"><i>Số: ....../KH-${info.name ? info.name.replace(/[^A-Za-zÀ-ỹ]/g,'').slice(0,6) : 'TH'}</i></p>`;
    w += `<h1 style="margin-top:16pt">KẾ HOẠCH<br/>TỰ ĐÁNH GIÁ KIỂM ĐỊNH CHẤT LƯỢNG GIÁO DỤC<br/>NĂM HỌC ${info.academicYearFrom}-${info.academicYearTo}</h1>`;
    w += `<p><b>Căn cứ</b> Thông tư số 17/2018/TT-BGDĐT ngày 22/8/2018 của Bộ Giáo dục và Đào tạo ban hành Quy định về kiểm định chất lượng giáo dục và công nhận đạt chuẩn quốc gia đối với trường tiểu học;</p>`;
    w += `<p><b>Căn cứ</b> Thông tư số 22/2024/TT-BGDĐT ngày 10/12/2024 của Bộ Giáo dục và Đào tạo sửa đổi, bổ sung một số điều của Thông tư 17/2018;</p>`;
    w += `<p><b>Căn cứ</b> Công văn số 5932/BGDĐT-QLCL ngày 28/12/2018 của Bộ Giáo dục và Đào tạo hướng dẫn tự đánh giá và đánh giá ngoài cơ sở giáo dục phổ thông;</p>`;
    w += `<p>${(info.name || 'Nhà trường')} xây dựng Kế hoạch tự đánh giá kiểm định chất lượng giáo dục năm học ${info.academicYearFrom}-${info.academicYearTo} với nội dung cụ thể như sau:</p>`;

    w += `<h2>I. MỤC ĐÍCH TỰ ĐÁNH GIÁ</h2><p>${plan.purpose || '[CẦN BỔ SUNG]'}</p>`;
    w += `<h2>II. PHẠM VI TỰ ĐÁNH GIÁ</h2><p>${plan.scope || '[CẦN BỔ SUNG]'}</p>`;

    w += `<h2>IV. HỘI ĐỒNG TỰ ĐÁNH GIÁ</h2>`;

    council.forEach((m, i) => {
      w += `<tr><td style="text-align:center">${i+1}</td><td>${m.name || ''}</td><td>${m.position || ''}</td><td>${m.role || ''}</td></tr>`;
    });
    w += `</table>`;

    w += `<h2>V. PHƯƠNG PHÁP, CÔNG CỤ ĐÁNH GIÁ</h2><p>${plan.methodology || '[CẦN BỔ SUNG]'}</p>`;

    w += `<h2>VI. KẾ HOẠCH CHI TIẾT THEO 7 BƯỚC (CV 5932)</h2>`;
    w += `<table><tr><th style="width:5%">Bước</th><th style="width:38%">Nội dung công việc</th><th style="width:18%">Người phụ trách</th><th style="width:14%">Thời hạn</th><th>Ghi chú</th></tr>`;
    CV5932_STEPS.forEach(step => {
      const wf = workflow.find(w => w.id === step.id) || {};
      w += `<tr><td style="text-align:center">${step.id}</td><td><b>${step.name}</b><br/><i style="font-size:12pt">${step.desc}</i></td><td>${wf.assignee || '...'}</td><td>${wf.deadline || '...'}</td><td>${wf.note || ''}</td></tr>`;
    });
    w += `</table>`;

    w += `<h2>VII. KINH PHÍ THỰC HIỆN</h2><p>${plan.budget || '[CẦN BỔ SUNG]'}</p>`;
    w += `<h2>VIII. NGUỒN LỰC, ĐIỀU KIỆN ĐẢM BẢO</h2><p>${plan.resources || '[CẦN BỔ SUNG]'}</p>`;
    if (plan.notes) w += `<h2>IX. GHI CHÚ</h2><p>${plan.notes}</p>`;

    w += `<p style="margin-top:18pt"><b>Tổ chức thực hiện:</b> Các thành viên Hội đồng tự đánh giá theo nhiệm vụ được phân công; báo cáo tiến độ hằng tuần với Chủ tịch Hội đồng.</p>`;
    w += `<p style="margin-top:20pt">Trên đây là Kế hoạch tự đánh giá của ${info.name || 'nhà trường'} năm học ${info.academicYearFrom}-${info.academicYearTo}./.</p>`;

    w += `<table style="border:0;margin-top:22pt"><tr><td style="border:0;width:50%;vertical-align:top;text-align:center"><b>Nơi nhận:</b><br/><i style="font-size:12pt;text-align:left;display:block">- Sở GD&amp;ĐT ${info.province || '...'} (để b/c);<br/>- UBND ${info.ward || 'xã'} (để b/c);<br/>- Hội đồng TĐG (để t/h);<br/>- Lưu: VT.</i></td><td style="border:0;text-align:center;vertical-align:top"><b>HIỆU TRƯỞNG</b><br/>(Ký tên, đóng dấu)<br/><br/><br/><br/><b>${chair.name || info.principal || '...'}</b></td></tr></table>`;

    w += `</div></body></html>`;

    const blob = new Blob([w], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `KeHoachTDG_${(info.name || 'Truong').replace(/\s+/g,'_')}_${info.academicYearFrom}-${info.academicYearTo}.doc`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('⬇ Đã xuất Kế hoạch TĐG');
  };

  return (
    <div className="ws-main">
      <div className="ws-wrap" style={{maxWidth:920}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:14,marginBottom:20}}>
          <div>
            <h1 className="ws-title">Kế hoạch tự đánh giá</h1>

          </div>
          <button className="btn btn-primary" onClick={exportPlan}><IDown className="w-4 h-4"/> Xuất Kế hoạch (.doc)</button>

        </div>

        <div className="ws-card plan-section">

/* ============================================================
   GUIDE MODAL — thay cho sidebar phải
   Mở bằng nút "Hướng dẫn" / "Chỉ báo" ở topbar.
   Nội dung phụ thuộc `active`:
     - null        → hướng dẫn khởi đầu + căn cứ pháp lý
     - tieuchi     → tabs Mức 1/2/3/4 + chỉ báo NGUYÊN VĂN + nút AI/Sửa
     - coso/.../   → mô tả mục + nút AI/Sửa
============================================================ */
function GuideModal({ active, activeGen, data, generating, generateOne, startEdit, onClose }) {
  const [mucTab, setMucTab] = useState(1);

  const renderBody = () => {
    if (!active) {
      return (
        <>
          <div className="dp-head">
            <div className="dp-kicker">Hướng dẫn</div>
            <div className="dp-title">Bắt đầu từ đâu?</div>
          </div>
          <div className="dp-body" style={{fontSize:13,color:'var(--ink-muted)',lineHeight:1.7}}>
            <p style={{marginBottom:10}}><b style={{color:'var(--ink)'}}>1.</b> Bấm <b>📍 tên trường</b> ở thanh tiêu đề để điền tên trường, HT, năm học, quy mô.</p>
            <p style={{marginBottom:10}}><b style={{color:'var(--ink)'}}>2.</b> Bấm <b>🗂 Tư liệu</b> (biểu tượng thư mục) để dán danh mục minh chứng, báo cáo cũ (nếu có), link Drive.</p>
            <p style={{marginBottom:10}}><b style={{color:'var(--ink)'}}>3.</b> Click vào từng mục ở dàn ý trái hoặc nhấn <b>✨ AI toàn bộ</b> để tạo báo cáo.</p>
            <p style={{marginBottom:10}}><b style={{color:'var(--ink)'}}>4.</b> Khi đang ở một <b>tiêu chí</b>, nút này sẽ hiện <b>chỉ báo a/b/c theo từng Mức</b> để bạn tra cứu.</p>
            <div className="divider"/>
            <div style={{fontSize:12,color:'var(--faint)'}}>
              <b>Căn cứ pháp lý:</b><br/>
              • TT 17/2018/TT-BGDĐT (22/8/2018)<br/>
              • <b>TT 22/2024/TT-BGDĐT</b> (10/12/2024) — sửa Điều 9<br/>
              • CV 5932/BGDĐT-QLCL (28/12/2018)<br/>
              • TT 13/2020 (sửa bởi TT 23/2024) — CSVC
            </div>
            <div className="divider"/>
            <div style={{fontSize:12,color:'var(--amber)',background:'var(--amber-50)',padding:10,borderRadius:7,border:'1px solid #fde68a'}}>
              <b>⚠ Lưu ý hành chính 2 cấp:</b> chỉ có xã/phường + tỉnh/thành phố. KHÔNG còn huyện, KHÔNG còn Phòng GD&ĐT. AI tự lược các cụm này khi gặp trong tư liệu cũ.
            </div>
          </div>
        </>
      );
    }

    if (active.kind === 'tieuchi') {
      const cr = active.meta.criterion;
      const stdId = active.meta.standardId;
      const stdName = active.meta.standardName;
      const availableMucs = [1,2,3,4].filter(m => cr.levels[m] && cr.levels[m].length > 0);
      const currentMuc = availableMucs.includes(mucTab) ? mucTab : (availableMucs[0] || 1);
      const chiBaos = cr.levels[currentMuc] || [];

      return (
        <>
          <div className="dp-head">
            <div className="dp-kicker">Tiêu chuẩn {stdId} · {stdName}</div>
            <div className="dp-title">Tiêu chí {stdId}.{cr.num}</div>
            <div style={{fontSize:13,color:'var(--ink-muted)',marginTop:4}}>{cr.name}</div>
          </div>
          <div className="dp-body">
            <div className="dp-tabs">
              {availableMucs.map(m => (
                <div key={m} className={`dp-tab ${currentMuc===m?'active':''}`} onClick={() => setMucTab(m)}>Mức {m}</div>
              ))}
            </div>
            <div className="dp-muc-desc">{MUC_DESC[currentMuc]}</div>
            {chiBaos.length === 0 ? (
              <div style={{fontSize:12.5,color:'var(--faint)',fontStyle:'italic',padding:10}}>Thông tư không quy định yêu cầu riêng ở mức này.</div>
            ) : chiBaos.map((cb, i) => (
              <div key={i} className="dp-chibao">{cb}</div>
            ))}

            <div className="dp-section-label">Trạng thái</div>

              {activeGen?.status === 'done' && <span className="chip chip-ok">✓ Đã tạo</span>}
              {activeGen?.status === 'generating' && <span className="chip chip-sky">◐ Đang tạo</span>}
              {activeGen?.status === 'error' && <span className="chip chip-err">✗ Lỗi</span>}
              {!activeGen && <span className="chip chip-warn">○ Chưa tạo</span>}
              {activeGen?.updatedAt && <span style={{fontSize:11,color:'var(--faint)'}}>{new Date(activeGen.updatedAt).toLocaleString('vi-VN')}</span>}
            </div>

            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" style={{flex:1}} disabled={!!generating} onClick={() => generateOne(active)}>
                {generating === active.id ? <><ILoad className="w-4 h-4 animate-spin"/> AI đang viết…</> : <><ISpark className="w-4 h-4"/> {activeGen?.status === 'done' ? 'Tạo lại bằng AI' : 'Tạo bằng AI'}</>}
              </button>
              <button className="btn" onClick={() => startEdit(active.id)} disabled={!!generating}>
                <IEdit className="w-4 h-4"/> Sửa tay
              </button>
            </div>
          </div>
        </>
      );
    }

    // Computed sections — không có nút AI/Sửa
    if (active.kind === 'computed') {
      const computedGuides = {
        bangtonghop: {
          title: 'Bảng tổng hợp kết quả tự đánh giá',
          hint: 'Bảng này được hệ thống TỰ TÍNH từ kết quả tự đánh giá của từng tiêu chí (parse cụm "Đạt Mức X" / "Không đạt" trong mục 5. Tự đánh giá của mỗi tiêu chí).',
          note: 'Bạn không cần sinh bằng AI hay chỉnh tay. Muốn thay đổi bảng → chỉnh phần tự đánh giá ở từng tiêu chí.'
        },
        phuluc: {
          title: 'Phần IV · Phụ lục — Danh mục minh chứng',
          hint: 'Phụ lục được tự động tổng hợp từ danh mục minh chứng đã dán trong mục 🗂 Tư liệu. Khi xuất Word sẽ có: (1) Danh mục minh chứng nhóm theo tiêu chí; (2) Bảng mã hóa tổng hợp.',
          note: 'Muốn sửa nội dung → bấm 🗂 Tư liệu ở thanh tiêu đề rồi sửa phần "Danh mục minh chứng".'
        }
      };
      const cg = computedGuides[active.type];
      return (
        <>
          <div className="dp-head">

        </>

    }

    const stdId = active.meta?.standardId;
    const metaGuides = {
      coso: { title: 'Phần I · Cơ sở dữ liệu', hint: 'Thông tin chung của nhà trường + cơ cấu tổ chức, quy mô 5 năm gần nhất (số lớp theo khối, học sinh, CB-GV-NV, CSVC). Không đánh giá — chỉ liệt kê dữ liệu. AI sẽ sinh bảng có mã [CẦN BỔ SUNG] ở ô thiếu — bạn điền số liệu thủ công sau.' },
      datvande: { title: 'A. Đặt vấn đề', hint: 'Khái quát tình hình nhà trường, mục đích tự đánh giá, quy trình 7 bước theo CV 5932, phương pháp đánh giá.' },
      modau: { title: `Tiêu chuẩn ${stdId} — Mở đầu`, hint: 'Đoạn giới thiệu tổng quan về Tiêu chuẩn trước khi vào các tiêu chí: vai trò, ý nghĩa, khái quát nội dung các tiêu chí thuộc tiêu chuẩn. Độ dài 150-250 từ, văn phong hành chính trang trọng.' },
      'ketluan-tc': { title: `Tiêu chuẩn ${stdId} — Kết luận`, hint: 'Tổng kết sau khi đánh giá xong các tiêu chí thuộc Tiêu chuẩn: điểm mạnh tổng thể, điểm yếu, thống kê số tiêu chí đạt/không đạt theo từng Mức. AI sẽ đọc nội dung tự đánh giá của từng tiêu chí để tổng hợp.' },
      ketluan: { title: 'Phần III · Kết luận chung', hint: 'Tổng hợp số lượng, tỷ lệ % chỉ báo & tiêu chí đạt/không đạt → mức đánh giá chung. Điểm mạnh, hạn chế, định hướng.' }
    };
    const guide = metaGuides[active.type] || { title: active.label, hint: '' };
    return (
      <>
        <div className="dp-head">
          <div className="dp-kicker">Mục mở đầu / kết thúc</div>
          <div className="dp-title">{guide.title}</div>
        </div>
        <div className="dp-body">
          <div style={{fontSize:13,color:'var(--ink-muted)',lineHeight:1.65,padding:'12px 14px',background:'#f8fafc',borderRadius:7,border:'1px solid var(--line-soft)'}}>{guide.hint}</div>

          <div className="dp-section-label">Trạng thái</div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
            {activeGen?.status === 'done' && <span className="chip chip-ok">✓ Đã tạo</span>}
            {activeGen?.status === 'generating' && <span className="chip chip-sky">◐ Đang tạo</span>}
            {activeGen?.status === 'error' && <span className="chip chip-err">✗ Lỗi</span>}
            {!activeGen && <span className="chip chip-warn">○ Chưa tạo</span>}
          </div>

          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary" style={{flex:1}} disabled={!!generating} onClick={() => generateOne(active)}>

            </button>
            <button className="btn" onClick={() => startEdit(active.id)} disabled={!!generating}>
              <IEdit className="w-4 h-4"/> Sửa tay
            </button>
          </div>
        </div>
      </>
    );
  };

  return (
    <div className="overlay fadein" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:560}}>
        <div className="modal-h">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <IInfo className="w-5 h-5"/>
            <div className="display" style={{fontSize:18,fontWeight:600}}>
              {active ? (active.kind === 'tieuchi' ? 'Chỉ báo tiêu chí' : active.kind === 'computed' ? 'Mục tự tính' : 'Hướng dẫn mục') : 'Hướng dẫn'}
            </div>
          </div>
          <button className="btn btn-icon btn-ghost" onClick={onClose}><IX className="w-4 h-4"/></button>
        </div>
        <div className="modal-b">
          {renderBody()}
        </div>
      </div>
    </div>
  );
}

function CloudModal({ settings, onLoad, onClose }) {
  const [list, setList] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);

  const fetchList = async () => {
    setLoading(true); setErr(null);
    try {
      const r = await callBackend(settings.appsScriptUrl, { action: 'listReports' });
      setList(r.reports || []);
    } catch (e) { setErr(e.message); }
    setLoading(false);
  };

  useEffect(() => { fetchList(); }, []);

  const del = async (rid) => {
    if (!confirm('Xoá báo cáo này? Không thể hoàn tác.')) return;
    try { await callBackend(settings.appsScriptUrl, { action: 'deleteReport', reportId: rid }); fetchList(); }
    catch (e) { alert('❌ ' + e.message); }
  };

  return (
    <div className="overlay fadein" onClick={onClose}>
      <div className="modal modal-lg" onClick={e => e.stopPropagation()}>
        <div className="modal-h">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <ICloud className="w-5 h-5"/>
            <div className="display" style={{fontSize:18,fontWeight:600}}>Báo cáo trên Google Drive</div>
          </div>
          <div style={{display:'flex',gap:4}}>
            <button className="btn btn-icon btn-ghost" onClick={fetchList} title="Tải lại"><IRefresh className="w-4 h-4"/></button>
            <button className="btn btn-icon btn-ghost" onClick={onClose}><IX className="w-4 h-4"/></button>
          </div>
        </div>
        <div className="modal-b">
          {loading && <div style={{textAlign:'center',padding:40,color:'var(--ink-muted)'}}><ILoad className="w-5 h-5 animate-spin inline-block mr-2"/> Đang tải…</div>}
          {err && <div style={{padding:12,background:'var(--rose-50)',border:'1px solid #fecaca',borderRadius:8,color:'var(--rose)',fontSize:13}}>❌ {err}</div>}
          {list && list.length === 0 && <div style={{textAlign:'center',padding:40,color:'var(--ink-muted)'}}>Chưa có báo cáo nào. Hãy bấm <b>☁ Lưu Drive</b> sau khi soạn xong.</div>}
          {list && list.length > 0 && (
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {list.map(r => (
                <div key={r.reportId} style={{display:'flex',alignItems:'center',gap:10,padding:12,border:'1px solid var(--line)',borderRadius:8,background:'#fff'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13.5}}>{r.schoolName || '(chưa đặt tên)'} · <span style={{color:'var(--brand-600)'}}>{r.academicYear}</span></div>
                    <div style={{fontSize:11.5,color:'var(--ink-muted)',marginTop:2}}>
                      {r.schoolType} · {r.province} · HT: {r.principal} · {r.progress} mục · Cập nhật: {r.updatedAt ? new Date(r.updatedAt).toLocaleString('vi-VN') : '—'}
                    </div>
                  </div>
                  <button className="btn btn-xs btn-soft" onClick={() => onLoad(r.reportId)}><ICloudDown className="w-3.5 h-3.5"/> Mở</button>
                  <button className="btn btn-icon btn-xs btn-ghost" onClick={() => del(r.reportId)} title="Xoá"><ITrash className="w-3.5 h-3.5"/></button>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   MOUNT
============================================================ */
// Error boundary bắt lỗi runtime của bất kỳ component nào (React 18)
class ErrBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error('React render error:', err, info); }
  render() {
    if (this.state.err) {
      return (
        <div style={{padding:'2em',color:'#b91c1c',fontFamily:'system-ui',lineHeight:1.6}}>
          <h2 style={{margin:'0 0 10px'}}>❌ Lỗi khởi tạo giao diện</h2>
          <p style={{color:'#475569'}}>Mở DevTools (F12) → tab Console để xem chi tiết.</p>
          <pre style={{whiteSpace:'pre-wrap',background:'#fee',padding:'1em',borderRadius:8,fontSize:12,color:'#7f1d1d'}}>
            {this.state.err.stack || this.state.err.message || String(this.state.err)}
          </pre>
          <button onClick={() => { localStorage.clear(); location.reload(); }} style={{padding:'8px 16px',background:'#0c5da5',color:'#fff',border:0,borderRadius:6,cursor:'pointer',marginTop:10}}>🔄 Xoá cache &amp; tải lại</button>
        </div>
      );
    }
    return this.props.children;
  }
}

function boot() {
  try {
    const b = document.getElementById('boot');
    if (b) b.style.display = 'none';
    const root = document.getElementById('root');
    if (!root) { alert('Lỗi: không tìm thấy #root'); return; }
    ReactDOM.createRoot(root).render(<ErrBoundary><App/></ErrBoundary>);
  } catch (err) {
    document.body.innerHTML = '<div style="padding:2em;color:#b91c1c;font-family:system-ui"><h2>❌ Lỗi khởi tạo</h2><pre style="white-space:pre-wrap;background:#fee;padding:1em;border-radius:8px">' + (err.stack || err.message || err) + '</pre></div>';
  }
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
else boot();
</script>
